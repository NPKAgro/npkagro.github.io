<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cuaderno LQ">
  <meta name="theme-color" content="#0f1117">
  <title>Cuaderno de Campo · La Quinta</title>
  <script>window.LQ_AUTH_MODE = 'equipo'; window.LQ_AUTH_SHOW_BAR = false;</script>
  <script src="auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --bg2:         #161b24;
      --bg3:         #1e2534;
      --border:      rgba(255,255,255,0.08);
      --text:        #f0f2f5;
      --text2:       #8b93a5;
      --text3:       #555e70;
      --accent:      #3b82f6;
      --accent2:     #1d4ed8;
      --accent-pale: rgba(59,130,246,0.15);
      --green:       #10b981;
      --amber:       #f59e0b;
      --red:         #ef4444;
      --purple:      #8b5cf6;
      --teal:        #14b8a6;
      --radius:      10px;
      --radius-sm:   8px;
      --shadow:      0 4px 20px rgba(0,0,0,0.5);
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 110px);
      -webkit-tap-highlight-color: transparent;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── HEADER ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-back {
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: var(--text2);
      text-decoration: none; flex-shrink: 0;
      transition: all 0.12s;
    }
    .header-back:active { border-color: var(--accent); color: var(--accent); }
    .header-brand { display: flex; flex-direction: column; line-height: 1.25; flex: 1; }
    .header-empresa { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .header-empresa span { color: var(--accent); }
    .header-predio { font-size: 11px; color: var(--text3); }
    .header-datetime { text-align: right; flex-shrink: 0; }
    .header-fecha { font-size: 12px; color: var(--text3); }
    .header-hora {
      font-size: 18px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1.1;
    }

    /* ── GPS BAR ── */
    .gps-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 18px;
      font-size: 12px;
      font-weight: 600;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      color: var(--text3);
    }
    .gps-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--text3); }
    .gps-bar.buscando .gps-dot { background: var(--amber); animation: pulse 1.2s ease-in-out infinite; }
    .gps-bar.ok       .gps-dot { background: var(--green); }
    .gps-bar.error    .gps-dot { background: var(--red); }
    .gps-coords { margin-left: 4px; font-family: monospace; font-size: 11px; font-weight: 400; color: var(--text3); }
    .gps-refresh {
      margin-left: auto;
      background: none; border: none; color: var(--text3);
      font-size: 14px; cursor: pointer; padding: 2px 4px;
      transition: color 0.12s;
    }
    .gps-refresh:active { color: var(--accent); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── CONTENT ── */
    .content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .card.error-card { border-color: rgba(239,68,68,0.5); }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .card-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
    }
    .optional-tag {
      font-size: 10px;
      color: var(--text3);
      background: var(--bg3);
      border-radius: 99px;
      padding: 2px 8px;
    }
    .card-body { padding: 12px 14px; }

    /* ── CATEGORIA CHIPS ── */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }
    .cat-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.12s;
      user-select: none;
    }
    .cat-btn:active { transform: scale(0.95); }
    .cat-btn.active {
      background: var(--accent-pale);
      border-color: var(--accent);
    }
    .cat-btn.active .cat-label { color: #60a5fa; }
    .cat-icon  { font-size: 22px; }
    .cat-label { font-size: 11px; font-weight: 600; color: var(--text3); text-align: center; line-height: 1.2; }

    /* ── CUARTEL GRID ── */
    .btn-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .sel-btn {
      padding: 12px 8px;
      border-radius: var(--radius-sm);
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
      text-align: center;
    }
    .sel-btn.active {
      background: var(--accent-pale);
      border-color: var(--accent);
      color: #60a5fa;
    }
    .sel-btn:active { transform: scale(0.93); }

    /* ── STEPPER ── */
    .stepper {
      display: flex;
      align-items: center;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .stepper:focus-within { border-color: var(--accent); }
    .stepper-btn {
      background: none; border: none;
      font-size: 26px; font-weight: 300;
      color: var(--accent);
      padding: 10px 18px;
      cursor: pointer; line-height: 1;
      user-select: none;
      transition: background 0.1s;
    }
    .stepper-btn:active { background: var(--accent-pale); }
    .stepper-input {
      flex: 1; text-align: center;
      font-size: 28px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: transparent; border: none;
      color: var(--text); outline: none;
      padding: 10px 4px; width: 0; min-width: 0;
      -moz-appearance: textfield;
    }
    .stepper-input::placeholder { color: var(--text3); font-size: 14px; font-weight: 500; }
    .stepper-input::-webkit-outer-spin-button,
    .stepper-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* ── SUBLABEL ── */
    .sublabel {
      font-size: 11px; font-weight: 600;
      color: var(--text3); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 7px;
    }
    .sublabel span { font-weight: 400; opacity: 0.7; text-transform: none; }

    /* ── TEXTAREA ── */
    .field-textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      padding: 11px 13px;
      outline: none;
      resize: vertical;
      min-height: 90px;
      font-family: inherit;
      transition: border-color 0.12s;
    }
    .field-textarea:focus { border-color: var(--accent); }

    /* ── FOTOS GRID ── */
    .fotos-grid {
      display: grid;
      gap: 8px;
      margin-bottom: 8px;
    }
    .fotos-grid.n1 { grid-template-columns: 1fr; }
    .fotos-grid.n2,
    .fotos-grid.n3,
    .fotos-grid.n4 { grid-template-columns: 1fr 1fr; }
    .foto-thumb {
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--accent);
      background: #000;
    }
    .fotos-grid.n1 .foto-thumb { aspect-ratio: 16/9; }
    .fotos-grid.n2 .foto-thumb,
    .fotos-grid.n3 .foto-thumb,
    .fotos-grid.n4 .foto-thumb { aspect-ratio: 4/3; }
    .foto-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .foto-delete {
      position: absolute; top: 5px; right: 5px;
      background: rgba(0,0,0,0.72);
      color: #fff; border: none; border-radius: 50%;
      width: 28px; height: 28px; font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .foto-delete:active { background: rgba(239,68,68,0.8); }
    .foto-num {
      position: absolute; bottom: 5px; left: 7px;
      background: rgba(0,0,0,0.6); color: #fff;
      font-size: 11px; padding: 1px 6px;
      border-radius: 4px; font-weight: 500;
    }
    .btn-add-foto {
      width: 100%;
      background: var(--bg3);
      border: 1.5px dashed rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 16px;
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.12s;
    }
    .btn-add-foto:active { border-color: var(--accent); color: var(--accent); }
    .add-icon { font-size: 20px; }
    #fileInput { display: none; }

    /* ── UBICACION RESUMEN ── */
    .ubicacion-resumen {
      display: none;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 12px;
      color: #93c5fd;
      font-weight: 500;
    }
    .ubicacion-resumen.visible { display: block; }

    /* ── BOTTOM BAR ── */
    .bottombar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      z-index: 40;
    }
    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.12s, background 0.12s;
    }
    .btn-submit:active { opacity: 0.85; }
    .btn-submit:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; opacity: 1; }

    /* ── OVERLAY LOADING ── */
    .overlay-loading-bg {
      position: fixed; inset: 0;
      background: rgba(10,13,20,0.95);
      z-index: 10000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }
    .overlay-loading-bg.visible { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .overlay-sub   { font-size: 14px; color: var(--text2); line-height: 1.6; }

    /* ── OVERLAY ÉXITO ── */
    .overlay-success-bg {
      position: fixed; inset: 0;
      background: rgba(10,13,20,0.97);
      z-index: 10000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }
    .overlay-success-bg.visible { display: flex; }
    .success-icon { font-size: 72px; animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes pop { from { transform: scale(0); opacity:0; } to { transform: scale(1); opacity:1; } }
    .success-msg {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 13px;
      color: var(--text2);
      text-align: left;
      line-height: 1.7;
      width: 100%;
      max-width: 340px;
      white-space: pre-line;
    }
    .success-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 340px;
    }
    .btn-nuevo {
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.15);
      background: var(--accent-pale);
      color: var(--text);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-nuevo:active { background: rgba(59,130,246,0.3); }
    .btn-inicio {
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      font-size: 15px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .btn-inicio:active { background: rgba(255,255,255,0.06); }

    /* ── TOAST ── */
    .toast {
      display: none;
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%);
      background: var(--bg3); border: 1px solid rgba(239,68,68,0.4);
      color: var(--red);
      padding: 10px 20px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
      z-index: 200; max-width: 88vw;
      text-align: center; box-shadow: var(--shadow);
    }
    .toast.visible { display: block; }
    .toast.ok { border-color: rgba(16,185,129,0.4); color: var(--green); }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <a class="header-back" href="app.html" title="Portal">‹</a>
  <div class="header-brand">
    <div class="header-empresa">Agrícola <span>del Pedregal</span></div>
    <div class="header-predio">La Quinta · Cuaderno de campo</div>
  </div>
  <div class="header-datetime">
    <div class="header-fecha" id="hdrFecha"></div>
    <div class="header-hora"  id="hdrHora"></div>
  </div>
</div>

<!-- ── GPS BAR ── -->
<div class="gps-bar buscando" id="gpsBar">
  <div class="gps-dot"></div>
  <span id="gpsMsg">🛰 Buscando GPS...</span>
  <span class="gps-coords" id="gpsCoords"></span>
  <button class="gps-refresh" onclick="pedirGPS()" title="Actualizar GPS">↻</button>
</div>

<div class="content">

  <!-- ── CATEGORÍA ── -->
  <div class="card" id="cardCategoria">
    <div class="card-header">
      <span class="card-label">🏷 Tipo de registro</span>
      <span class="optional-tag">Opcional</span>
    </div>
    <div class="card-body">
      <div class="cat-grid" id="catGrid"></div>
    </div>
  </div>

  <!-- ── CUARTEL ── -->
  <div class="card" id="cardCuartel">
    <div class="card-header"><span class="card-label">🌳 Cuartel</span></div>
    <div class="card-body">
      <div class="btn-grid-3" id="cuartelGrid"></div>
    </div>
  </div>

  <!-- ── HILERA + PLANTA ── -->
  <div class="card" id="cardUbicacion">
    <div class="card-header"><span class="card-label">📍 Ubicación</span><span class="optional-tag">Opcional</span></div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:14px">

      <div>
        <div class="sublabel">Hilera <span>(1–59)</span></div>
        <div class="stepper">
          <button class="stepper-btn" onclick="cambiarHilera(-1)">−</button>
          <input type="number" class="stepper-input" id="hileraInput"
            min="1" max="59" placeholder="—" inputmode="numeric"
            oninput="onHileraInput(this.value)">
          <button class="stepper-btn" onclick="cambiarHilera(+1)">+</button>
        </div>
      </div>

      <div>
        <div class="sublabel">Claro <span>(1–5)</span></div>
        <div class="btn-grid-5" id="claroGrid"></div>
      </div>

      <div>
        <div class="sublabel">Planta <span>(1–16)</span></div>
        <div class="stepper">
          <button class="stepper-btn" onclick="cambiarPlanta(-1)">−</button>
          <input type="number" class="stepper-input" id="plantaInput"
            min="1" max="16" placeholder="—" inputmode="numeric"
            oninput="onPlantaInput(this.value)">
          <button class="stepper-btn" onclick="cambiarPlanta(+1)">+</button>
        </div>
      </div>

      <div class="ubicacion-resumen" id="ubicResumen"></div>
    </div>
  </div>

  <!-- ── FOTOS ── -->
  <div class="card" id="cardFotos">
    <div class="card-header">
      <span class="card-label">📷 Fotografías</span>
      <span class="optional-tag" id="fotoContador">0 / 4</span>
    </div>
    <div class="card-body">
      <div class="fotos-grid" id="fotosGrid"></div>
      <button class="btn-add-foto" id="btnAddFoto" onclick="triggerCamera()">
        <span class="add-icon">📸</span>
        <span id="btnAddFotoTxt">Tomar foto</span>
      </button>
      <input type="file" id="fileInput" accept="image/*">
    </div>
  </div>

  <!-- ── NOTAS ── -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">📝 Notas</span>
      <span class="optional-tag">Opcional</span>
    </div>
    <div class="card-body">
      <textarea class="field-textarea" id="notas"
        placeholder="Describe lo que ves, lo que hay que hacer, estado del huerto..."></textarea>
    </div>
  </div>

  <!-- Espaciado final -->
  <div style="height: 8px"></div>

</div>

<!-- ── BOTTOM BAR ── -->
<div class="bottombar">
  <button class="btn-submit" id="btnSubmit" onclick="handleSubmit()">
    📤 &nbsp;Guardar registro
  </button>
</div>

<!-- ── OVERLAY LOADING ── -->
<div class="overlay-loading-bg" id="overlayLoading">
  <div class="spinner"></div>
  <div class="overlay-title">Enviando...</div>
  <div class="overlay-sub" id="loadingMsg">Comprimiendo fotos y subiendo a Drive</div>
</div>

<!-- ── OVERLAY ÉXITO ── -->
<div class="overlay-success-bg" id="overlaySuccess">
  <div class="success-icon">📓</div>
  <div class="overlay-title">¡Registro guardado!</div>
  <div class="success-msg" id="successMsg"></div>
  <div class="success-btns">
    <button class="btn-nuevo" onclick="resetForm()">＋ Nuevo registro</button>
    <a class="btn-inicio" href="app.html">← Inicio</a>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════
const CONFIG = {
  GAS_URL:      'https://script.google.com/macros/s/AKfycbydi5imjeA5bXY5TlA7MBVGkG6-Aq4XhYC0soXGPUMl41lEvdL8rc-xhjeRv9m0_aJg/exec',
  ACCESS_TOKEN: 'LQ2026-Santina',
  CUARTELES:    ['C2', 'C3', 'C4'],
  MAX_FOTOS:    4,
  N_HILERAS:    59,
  N_PLANTAS:    16,
  N_CLAROS:     5,
};

const CATEGORIAS = [
  { id: 'riego',     icon: '💧', label: 'Riego' },
  { id: 'plagas',    icon: '🐛', label: 'Plagas' },
  { id: 'labores',   icon: '🚜', label: 'Labores' },
  { id: 'estructura',icon: '🏗️', label: 'Estructura' },
  { id: 'suelo',     icon: '⛏️', label: 'Suelo' },
  { id: 'otro',      icon: '📌', label: 'Otro' },
];

const STATE_KEY = 'cuaderno_state_v1';
let appState = { categoria: null, cuartel: null, hilera: null, claro: null, planta: null, fotos: [], gps: null };
let gpsData  = null;

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
function init() {
  actualizarReloj();
  setInterval(actualizarReloj, 10000);

  // Construir categorías
  const catGrid = document.getElementById('catGrid');
  CATEGORIAS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className   = 'cat-btn';
    btn.dataset.val = cat.id;
    btn.innerHTML   = `<span class="cat-icon">${cat.icon}</span><span class="cat-label">${cat.label}</span>`;
    btn.onclick = () => seleccionarCategoria(cat.id);
    catGrid.appendChild(btn);
  });

  // Construir cuarteles
  const cGrid = document.getElementById('cuartelGrid');
  CONFIG.CUARTELES.forEach(c => {
    const btn = document.createElement('button');
    btn.className    = 'sel-btn';
    btn.textContent  = c;
    btn.dataset.val  = c;
    btn.onclick = () => seleccionarCuartel(c);
    cGrid.appendChild(btn);
  });

  // Construir claros (opcional)
  const claroGrid = document.getElementById('claroGrid');
  if (claroGrid) {
    for (let i = 1; i <= (CONFIG.N_CLAROS || 5); i++) {
      const btn = document.createElement('button');
      btn.className    = 'sel-btn';
      btn.textContent  = i;
      btn.dataset.val  = i;
      btn.onclick = () => seleccionarClaro(i);
      claroGrid.appendChild(btn);
    }
  }

  // File input
  // File input listener añadido dinámicamente en triggerCamera() (iOS fix)

  // Restaurar estado (fix iOS camera)
  restaurarEstado();

  // GPS
  pedirGPS();

  // Render fotos
  renderFotos();
}

// ── RELOJ ─────────────────────────────────────────────
function actualizarReloj() {
  const now = new Date();
  document.getElementById('hdrFecha').textContent =
    now.toLocaleDateString('es-CL', { weekday: 'short', day: 'numeric', month: 'short' });
  document.getElementById('hdrHora').textContent =
    now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
}

// ── GPS ───────────────────────────────────────────────
function pedirGPS() {
  const bar    = document.getElementById('gpsBar');
  const msg    = document.getElementById('gpsMsg');
  const coords = document.getElementById('gpsCoords');
  bar.className      = 'gps-bar buscando';
  msg.textContent    = '🛰 Buscando ubicación...';
  coords.textContent = '';

  if (!navigator.geolocation) {
    bar.className   = 'gps-bar error';
    msg.textContent = '⚠️ GPS no disponible';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      gpsData = {
        lat:      pos.coords.latitude,
        lng:      pos.coords.longitude,
        accuracy: Math.round(pos.coords.accuracy),
        ts:       new Date().toISOString(),
      };
      appState.gps = gpsData;
      guardarEstado();
      bar.className      = 'gps-bar ok';
      msg.textContent    = `📍 GPS ±${gpsData.accuracy}m`;
      coords.textContent = `${gpsData.lat.toFixed(5)}, ${gpsData.lng.toFixed(5)}`;
    },
    err => {
      bar.className   = 'gps-bar error';
      const m = { 1:'⚠️ GPS denegado', 2:'⚠️ GPS no disponible', 3:'⚠️ GPS tardó — toca ↻' };
      msg.textContent    = m[err.code] || '⚠️ Error GPS';
      coords.textContent = '';
      gpsData = null;
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
  );
}

// ── PERSISTENCIA ──────────────────────────────────────
function guardarEstado() {
  sessionStorage.setItem(STATE_KEY, JSON.stringify(appState));
}
function restaurarEstado() {
  const saved = sessionStorage.getItem(STATE_KEY);
  if (!saved) return;
  try {
    const s = JSON.parse(saved);
    if (s.categoria) seleccionarCategoria(s.categoria);
    if (s.cuartel)   seleccionarCuartel(s.cuartel);
    if (s.hilera)    setHilera(s.hilera);
    if (s.claro)     seleccionarClaro(s.claro);
    if (s.planta)    setPlanta(s.planta);
    if (s.fotos?.length) appState.fotos = s.fotos;
    if (s.gps) {
      gpsData = s.gps;
      document.getElementById('gpsBar').className = 'gps-bar ok';
      document.getElementById('gpsMsg').textContent    = `📍 GPS ±${s.gps.accuracy}m`;
      document.getElementById('gpsCoords').textContent = `${s.gps.lat.toFixed(5)}, ${s.gps.lng.toFixed(5)}`;
    }
  } catch(_) {}
}

// ── SELECCIONES ───────────────────────────────────────
function seleccionarCategoria(id) {
  appState.categoria = id;
  guardarEstado();
  document.querySelectorAll('#catGrid .cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === id);
  });
}

function seleccionarCuartel(c) {
  appState.cuartel = c;
  guardarEstado();
  document.querySelectorAll('#cuartelGrid .sel-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === c);
  });
  document.getElementById('cardCuartel').classList.remove('error-card');
  actualizarResumen();
}

function setHilera(n) {
  appState.hilera = n;
  guardarEstado();
  const inp = document.getElementById('hileraInput');
  if (inp) inp.value = n;
  actualizarResumen();
}
function cambiarHilera(delta) {
  const actual = appState.hilera || 0;
  setHilera(Math.max(1, Math.min(CONFIG.N_HILERAS, actual + delta)));
}
function onHileraInput(val) {
  const n = parseInt(val);
  if (!isNaN(n) && n >= 1 && n <= CONFIG.N_HILERAS) {
    appState.hilera = n; guardarEstado(); actualizarResumen();
  } else if (val === '' || val === '0') {
    appState.hilera = null; guardarEstado(); actualizarResumen();
  }
}

function seleccionarClaro(c) {
  // Toggle: si ya está seleccionado, deseleccionar
  if (appState.claro === c) {
    appState.claro = null;
  } else {
    appState.claro = c;
  }
  guardarEstado();
  document.querySelectorAll('#claroGrid .sel-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.val) === appState.claro);
  });
  actualizarResumen();
}

function setPlanta(n) {
  appState.planta = n;
  guardarEstado();
  const inp = document.getElementById('plantaInput');
  if (inp) inp.value = n;
  actualizarResumen();
}
function cambiarPlanta(delta) {
  const actual = appState.planta || 0;
  setPlanta(Math.max(1, Math.min(CONFIG.N_PLANTAS, actual + delta)));
}
function onPlantaInput(val) {
  const n = parseInt(val);
  if (!isNaN(n) && n >= 1 && n <= CONFIG.N_PLANTAS) {
    appState.planta = n; guardarEstado(); actualizarResumen();
  } else if (val === '' || val === '0') {
    appState.planta = null; guardarEstado(); actualizarResumen();
  }
}

function actualizarResumen() {
  const { cuartel, hilera, planta } = appState;
  const res = document.getElementById('ubicResumen');
  if (cuartel || hilera || planta) {
    const partes = [];
    if (cuartel) partes.push(`Cuartel ${cuartel}`);
    if (hilera)  partes.push(`Hilera ${hilera}`);
    if (planta)  partes.push(`Planta ${planta}`);
    res.textContent = '📍 ' + partes.join(' · ');
    res.classList.add('visible');
  } else {
    res.classList.remove('visible');
  }
}

// ── CÁMARA / FOTOS ────────────────────────────────────
function triggerCamera() {
  if (appState.fotos.length >= CONFIG.MAX_FOTOS) {
    showToast(`Máximo ${CONFIG.MAX_FOTOS} fotos por registro`);
    return;
  }
  // iOS necesita input fresco cada vez para disparar el evento change en PWA
  // Android necesita capture="environment" para abrir cámara directo
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const oldInput = document.getElementById('fileInput');
  const newInput = document.createElement('input');
  newInput.type   = 'file';
  newInput.id     = 'fileInput';
  newInput.accept = 'image/*';
  if (!isIOS) newInput.capture = 'environment'; // Android: abre cámara directo
  newInput.style.display = 'none';
  newInput.addEventListener('change', handleFileSelect);
  oldInput.parentNode.replaceChild(newInput, oldInput);
  newInput.click();
}

async function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const blob = await compressImage(file, 1280, 0.72);
  const b64  = await blobToBase64(blob);
  appState.fotos.push(b64);
  guardarEstado();
  renderFotos();
}

function renderFotos() {
  const grid     = document.getElementById('fotosGrid');
  const contador = document.getElementById('fotoContador');
  const btnTxt   = document.getElementById('btnAddFotoTxt');
  const n        = appState.fotos.length;

  contador.textContent = `${n} / ${CONFIG.MAX_FOTOS}`;
  btnTxt.textContent   = n > 0 ? 'Agregar otra foto' : 'Tomar foto';

  grid.className = 'fotos-grid' + (n > 0 ? ` n${Math.min(n, 4)}` : '');
  grid.innerHTML = appState.fotos.map((b64, i) => `
    <div class="foto-thumb">
      <img src="${b64}" alt="Foto ${i+1}">
      <button class="foto-delete" onclick="borrarFoto(${i})">✕</button>
      <span class="foto-num">${i+1}</span>
    </div>
  `).join('');

  document.getElementById('btnAddFoto').style.display =
    n >= CONFIG.MAX_FOTOS ? 'none' : 'flex';
}

function borrarFoto(idx) {
  appState.fotos.splice(idx, 1);
  guardarEstado();
  renderFotos();
}

// ── SUBMIT ────────────────────────────────────────────
async function handleSubmit() {

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = '⏳ Guardando...';

  // Mostrar overlay
  document.getElementById('loadingMsg').textContent =
    appState.fotos.length > 0 ? 'Comprimiendo fotos y subiendo a Drive' : 'Enviando registro...';
  document.getElementById('overlayLoading').classList.add('visible');

  const notas    = document.getElementById('notas').value.trim();
  const catInfo  = CATEGORIAS.find(c => c.id === appState.categoria);

  const payload = {
    action:      'cuaderno',
    token:       CONFIG.ACCESS_TOKEN,
    tipo:        appState.categoria || 'otro',
    cuartel:     appState.cuartel,
    hilera:      appState.hilera  || '',
    claro:       appState.claro   || '',
    planta:      appState.planta  || '',
    notas:       notas,
    gps_lat:     gpsData?.lat     || '',
    gps_lng:     gpsData?.lng     || '',
    gps_acc:     gpsData?.accuracy || '',
    ts:          new Date().toISOString(),
    fotos_count: appState.fotos.length,
    fotos:       appState.fotos,
  };

  try {
    if (typeof google !== 'undefined' && google.script) {
      google.script.run
        .withSuccessHandler(() => mostrarExito(catInfo, notas))
        .withFailureHandler(err => onError(err?.message || err))
        .guardarCuadernoScriptRun(JSON.stringify(payload));
    } else {
      await fetch(CONFIG.GAS_URL, {
        method:  'POST',
        mode:    'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify(payload),
      });
      mostrarExito(catInfo, notas);
    }
  } catch(err) {
    onError(err.message);
  }
}

function onError(msg) {
  document.getElementById('overlayLoading').classList.remove('visible');
  const btn = document.getElementById('btnSubmit');
  btn.disabled    = false;
  btn.textContent = '📤  Guardar registro';
  showToast('Error: ' + msg);
}

function mostrarExito(catInfo, notas) {
  document.getElementById('overlayLoading').classList.remove('visible');

  const lineas = [
    catInfo ? `${catInfo.icon} ${catInfo.label}` : '📌 Registro general',
    appState.cuartel ? `🌳 Cuartel ${appState.cuartel}` : '',
    appState.hilera  ? `📍 Hilera ${appState.hilera}${appState.planta ? ' · Planta ' + appState.planta : ''}` : '',
    gpsData          ? `🛰 GPS ±${gpsData.accuracy}m` : '',
    appState.fotos.length > 0 ? `📷 ${appState.fotos.length} foto(s)` : '',
    notas            ? `📝 ${notas.slice(0, 60)}${notas.length > 60 ? '…' : ''}` : '',
  ].filter(Boolean).join('\n');

  document.getElementById('successMsg').textContent = lineas;
  document.getElementById('overlaySuccess').classList.add('visible');
  sessionStorage.removeItem(STATE_KEY);
}

function resetForm() {
  document.getElementById('overlaySuccess').classList.remove('visible');
  appState = { categoria: null, cuartel: null, hilera: null, claro: null, planta: null, fotos: [], gps: gpsData };
  guardarEstado();

  // Reset UI
  document.querySelectorAll('.cat-btn, .sel-btn').forEach(b => b.classList.remove('active'));
  const hi = document.getElementById('hileraInput');
  const pi = document.getElementById('plantaInput');
  if (hi) hi.value = '';
  if (pi) pi.value = '';
  document.getElementById('notas').value = '';
  document.getElementById('ubicResumen').classList.remove('visible');
  document.getElementById('cardCuartel').classList.remove('error-card');
  renderFotos();

  const btn = document.getElementById('btnSubmit');
  btn.disabled    = false;
  btn.textContent = '📤  Guardar registro';
}

// ── COMPRESIÓN ────────────────────────────────────────
function compressImage(file, maxW, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        c.toBlob(resolve, 'image/jpeg', quality);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function blobToBase64(blob) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.readAsDataURL(blob);
  });
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast visible${type ? ' ' + type : ''}`;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('visible'), 3500);
}

init();
</script>
