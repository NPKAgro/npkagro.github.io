<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <title>Cuaderno de Campo · La Quinta</title>
  <meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="manifest.json">
  <script>window.LQ_AUTH_MODE = 'admin';</script>
  <script src="auth.js"></script>
  <style>
    :root {
      --bg:        #0f1117;
      --bg2:       #161b24;
      --bg3:       #1e2534;
      --border:    rgba(255,255,255,0.08);
      --text:      #f0f2f5;
      --text2:     #8b93a5;
      --text3:     #555e70;
      --accent:    #3b82f6;
      --green:     #10b981;
      --amber:     #f59e0b;
      --red:       #ef4444;
      --purple:    #8b5cf6;
      --teal:      #14b8a6;
      --orange:    #f97316;
      --radius:    10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* HEADER */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-block { display: flex; flex-direction: column; line-height: 1.2; flex: 1; }
    .logo-empresa { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-empresa span { color: var(--teal); }
    .logo-predio { font-size: 11px; color: var(--text3); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-back {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: var(--text2); text-decoration: none;
      margin-right: 12px; flex-shrink: 0; transition: all 0.12s;
    }
    .header-back:active, .header-back:hover { border-color: var(--teal); color: var(--teal); }
    #fechaHoy { font-size: 12px; color: var(--text3); }

    /* CONTROLES */
    .controls-wrap {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 2rem;
    }
    .controls-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: 12px; color: var(--text3); margin-right: 2px; }
    .fbtn {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 99px;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      transition: all 0.12s;
      white-space: nowrap;
    }
    .fbtn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .fbtn.active { background: var(--teal); border-color: var(--teal); color: #fff; font-weight: 500; }
    .btn-reload {
      margin-left: auto;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 99px;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      transition: all 0.12s;
    }
    .btn-reload:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .cuartel-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .cuartel-label { font-size: 11px; color: var(--text3); margin-right: 2px; }
    .cbtn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 99px;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text3);
      transition: all 0.12s;
    }
    .cbtn.active { background: rgba(139,92,246,0.2); border-color: var(--purple); color: #c4b5fd; }

    /* KPIs */
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 1.25rem 2rem 0;
    }
    .kpi {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
    }
    .kpi-lbl { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .kpi-val { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.1; }
    .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 5px; }

    /* GRID */
    .main-content { padding-bottom: 72px; }
    .grid-container {
      padding: 1.25rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
    }

    /* CARD */
    .entry-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .entry-card:hover { border-color: rgba(255,255,255,0.14); }

    .card-photo {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
      background: var(--bg3);
      cursor: zoom-in;
    }
    .card-photo-placeholder {
      width: 100%;
      height: 100px;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: var(--text3);
    }
    .card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .card-top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-loc {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      line-height: 1.3;
    }
    .tipo-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tipo-Riego      { background: rgba(59,130,246,0.2);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
    .tipo-Fertilización { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
    .tipo-Poda       { background: rgba(245,158,11,0.2);  color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
    .tipo-Fitosanitario { background: rgba(239,68,68,0.2);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    .tipo-Cosecha    { background: rgba(139,92,246,0.2);  color: #c4b5fd; border: 1px solid rgba(139,92,246,0.3); }
    .tipo-Otro       { background: rgba(255,255,255,0.06); color: var(--text2); border: 1px solid var(--border); }
    .tipo-default    { background: rgba(255,255,255,0.06); color: var(--text2); border: 1px solid var(--border); }

    .card-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .meta-chip {
      font-size: 11px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.45;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }
    .btn-sm {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      transition: all 0.12s;
    }
    .btn-sm:hover { background: var(--bg3); color: var(--text); }
    .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

    /* EMPTY / LOADING / ERROR */
    .state-box {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text3);
    }
    .state-box .icon { font-size: 48px; margin-bottom: 12px; }
    .state-box p { font-size: 14px; }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 94vw;
      max-height: 92vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      color: #fff;
      cursor: pointer;
      line-height: 1;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      z-index: 500;
      transition: transform 0.25s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <a class="header-back" href="index.html" title="Volver al panel">‹</a>
  <div class="logo-block">
    <div class="logo-empresa">Agrícola <span>del Pedregal</span></div>
    <div class="logo-predio">Cuaderno de Campo · La Quinta</div>
  </div>
  <div class="header-right">
    <span id="fechaHoy"></span>
  </div>
</header>

<div class="controls-wrap">
  <div class="controls-row">
    <span class="filter-label">Tipo:</span>
    <button class="fbtn active" data-tipo="todos" onclick="setFiltroTipo(this)">Todos</button>
    <button class="fbtn" data-tipo="Riego"        onclick="setFiltroTipo(this)">💧 Riego</button>
    <button class="fbtn" data-tipo="Fertilización" onclick="setFiltroTipo(this)">🌱 Fertilización</button>
    <button class="fbtn" data-tipo="Poda"          onclick="setFiltroTipo(this)">✂️ Poda</button>
    <button class="fbtn" data-tipo="Fitosanitario" onclick="setFiltroTipo(this)">🧪 Fitosanitario</button>
    <button class="fbtn" data-tipo="Cosecha"       onclick="setFiltroTipo(this)">🍒 Cosecha</button>
    <button class="fbtn" data-tipo="Otro"          onclick="setFiltroTipo(this)">📋 Otro</button>
    <button class="btn-reload" onclick="cargarDatos()">↻ Actualizar</button>
  </div>
  <div class="cuartel-row" id="cuartelRow">
    <span class="cuartel-label">Cuartel:</span>
    <button class="cbtn active" data-cuartel="todos" onclick="setFiltroCuartel(this)">Todos</button>
  </div>
</div>

<div class="kpis" id="kpis">
  <div class="kpi"><div class="kpi-lbl">Total registros</div><div class="kpi-val" id="kTotal">—</div></div>
  <div class="kpi"><div class="kpi-lbl">Con foto</div><div class="kpi-val" id="kFotos">—</div></div>
  <div class="kpi"><div class="kpi-lbl">Con GPS</div><div class="kpi-val" id="kGps">—</div></div>
  <div class="kpi"><div class="kpi-lbl">Cuarteles</div><div class="kpi-val" id="kCuarteles">—</div></div>
</div>

<div class="main-content">
  <div id="stateBox" class="state-box">
    <div class="icon">⏳</div>
    <p>Cargando registros...</p>
  </div>
  <div class="grid-container" id="grid" style="display:none"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightboxImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbydi5imjeA5bXY5TlA7MBVGkG6-Aq4XhYC0soXGPUMl41lEvdL8rc-xhjeRv9m0_aJg/exec';
// GAS_TOKEN deprecated — auth via Supabase JWT (window.lqGetIdToken())

// ── Escape XSS ────────────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

let todasEntradas = [];
let filtroTipo    = 'todos';
let filtroCuartel = 'todos';

// ── Fecha encabezado ─────────────────────────────────────────────
const hoy = new Date();
document.getElementById('fechaHoy').textContent =
  hoy.toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// ── Carga de datos ───────────────────────────────────────────────
function cargarDatos() {
  document.getElementById('stateBox').style.display = '';
  document.getElementById('stateBox').innerHTML = '<div class="icon">⏳</div><p>Cargando registros...</p>';
  document.getElementById('grid').style.display = 'none';

  lqGasCall({ action: 'list_cuaderno' })
    .then(data => {
      if (data.error) throw new Error(data.error);
      todasEntradas = data.entradas || [];
      construirFiltrosCuartel();
      aplicarFiltros();
    })
    .catch(err => {
      document.getElementById('stateBox').innerHTML =
        `<div class="icon">⚠️</div><p>Error al cargar: ${err.message}<br><small>Haz clic en "↻ Actualizar" para reintentar.</small></p>`;
    });
}

// ── Filtros ──────────────────────────────────────────────────────
function setFiltroTipo(btn) {
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtroTipo = btn.dataset.tipo;
  aplicarFiltros();
}

function setFiltroCuartel(btn) {
  document.querySelectorAll('.cbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtroCuartel = btn.dataset.cuartel;
  aplicarFiltros();
}

function construirFiltrosCuartel() {
  const row = document.getElementById('cuartelRow');
  const cuarteles = [...new Set(todasEntradas.map(e => e.cuartel).filter(Boolean))].sort();
  // Mantener botón "Todos"
  row.innerHTML = `<span class="cuartel-label">Cuartel:</span>
    <button class="cbtn active" data-cuartel="todos" onclick="setFiltroCuartel(this)">Todos</button>
    ${cuarteles.map(c => `<button class="cbtn" data-cuartel="${c}" onclick="setFiltroCuartel(this)">${c}</button>`).join('')}`;
}

function aplicarFiltros() {
  let lista = todasEntradas;
  if (filtroTipo !== 'todos')    lista = lista.filter(e => e.tipo_evento === filtroTipo);
  if (filtroCuartel !== 'todos') lista = lista.filter(e => e.cuartel === filtroCuartel);
  renderEntradas(lista);
  actualizarKPIs(lista);
}

// ── KPIs ─────────────────────────────────────────────────────────
function actualizarKPIs(lista) {
  document.getElementById('kTotal').textContent     = lista.length;
  document.getElementById('kFotos').textContent     = lista.filter(e => e.url_foto).length;
  document.getElementById('kGps').textContent       = lista.filter(e => e.gps_lat).length;
  document.getElementById('kCuarteles').textContent = new Set(lista.map(e => e.cuartel).filter(Boolean)).size;
}

// ── Render ───────────────────────────────────────────────────────
function tipoClass(tipo) {
  const mapa = {
    'Riego': 'tipo-Riego',
    'Fertilización': 'tipo-Fertilización',
    'Poda': 'tipo-Poda',
    'Fitosanitario': 'tipo-Fitosanitario',
    'Cosecha': 'tipo-Cosecha',
    'Otro': 'tipo-Otro',
  };
  return mapa[tipo] || 'tipo-default';
}

function tipoEmoji(tipo) {
  const mapa = { 'Riego':'💧', 'Fertilización':'🌱', 'Poda':'✂️', 'Fitosanitario':'🧪', 'Cosecha':'🍒', 'Otro':'📋' };
  return mapa[tipo] || '📋';
}

function renderEntradas(lista) {
  const grid = document.getElementById('grid');
  const state = document.getElementById('stateBox');

  if (lista.length === 0) {
    state.style.display = '';
    state.innerHTML = '<div class="icon">📭</div><p>Sin registros para este filtro.</p>';
    grid.style.display = 'none';
    return;
  }

  state.style.display = 'none';
  grid.style.display = '';

  grid.innerHTML = lista.map(e => {
    const fotos = e.url_foto ? e.url_foto.split('\n').filter(Boolean) : [];
    const fotoUrl = fotos.length > 0 ? fotos[0].replace('/view?usp=drivesdk', '/preview').replace('/view', '/preview') : null;
    const fotoThumb = fotos.length > 0
      ? fotos[0].replace('https://drive.google.com/file/d/', 'https://drive.google.com/thumbnail?id=').replace('/view?usp=drivesdk','&sz=w600').replace('/view','&sz=w600')
      : null;

    const locParts = [e.cuartel, e.hilera ? 'H'+e.hilera : '', e.planta ? 'P'+e.planta : ''].filter(Boolean);

    return `<div class="entry-card">
      ${fotoThumb
        ? `<img class="card-photo" src="${esc(fotoThumb)}" loading="lazy"
               onclick="openLightbox('${esc(fotoUrl || fotoThumb)}')"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="card-photo-placeholder" style="${fotoThumb ? 'display:none' : ''}">📋</div>
      <div class="card-body">
        <div class="card-top-row">
          <div class="card-loc">${esc(locParts.join(' · ') || '—')}</div>
          <span class="tipo-badge ${tipoClass(e.tipo_evento)}">${tipoEmoji(e.tipo_evento)} ${esc(e.tipo_evento || 'Sin tipo')}</span>
        </div>
        <div class="card-meta">
          <span class="meta-chip">📅 ${esc(e.fecha || '—')}</span>
          <span class="meta-chip">🕐 ${esc(e.hora || '—')}</span>
          ${e.maps_link ? `<a href="${esc(e.maps_link)}" target="_blank" class="meta-chip" style="color:var(--teal);text-decoration:none">📍 GPS</a>` : ''}
          ${fotos.length > 1 ? `<span class="meta-chip">🖼 ${fotos.length} fotos</span>` : ''}
        </div>
        ${e.descripcion ? `<div class="card-desc">${esc(e.descripcion)}</div>` : ''}
        <div class="card-actions">
          ${e.maps_link ? `<a href="${esc(e.maps_link)}" target="_blank"><button class="btn-sm">🗺 Ver en mapa</button></a>` : ''}
          <button class="btn-sm danger" onclick="confirmarEliminar(${e.fila})">🗑 Eliminar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Eliminar ─────────────────────────────────────────────────────
function confirmarEliminar(fila) {
  if (!confirm('¿Eliminar este registro del cuaderno?')) return;
  lqGasCall({ action: 'deleterow_cuaderno', fila })
    .then(() => { mostrarToast('Registro eliminado'); cargarDatos(); })
    .catch(() => mostrarToast('Error al eliminar'));
}

// ── Lightbox ─────────────────────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── Toast ────────────────────────────────────────────────────────
function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ─────────────────────────────────────────────────────────
cargarDatos();
</script>
</body>
</html>
