<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inventario LQ">
  <meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="manifest.json">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <title>Inventario · La Quinta</title>
  <script>window.LQ_AUTH_MODE = 'equipo'; window.LQ_AUTH_SHOW_BAR = false;</script>
  <script src="auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --bg2:     #161b24;
      --bg3:     #1e2534;
      --border:  rgba(255,255,255,0.08);
      --text:    #f0f2f5;
      --text2:   #8b93a5;
      --text3:   #555e70;
      --accent:  #f59e0b;
      --green:   #10b981;
      --amber:   #f59e0b;
      --red:     #ef4444;
      --radius:  10px;
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
      -webkit-tap-highlight-color: transparent;
    }
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 50;
    }
    .header-back {
      width: 36px; height: 36px;
      border-radius: 8px; background: var(--bg3);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: var(--text2);
      text-decoration: none; flex-shrink: 0;
    }
    .header-brand { display: flex; flex-direction: column; line-height: 1.25; flex: 1; }
    .header-empresa { font-size: 15px; font-weight: 700; }
    .header-empresa span { color: var(--accent); }
    .header-predio { font-size: 11px; color: var(--text3); }

    .summary {
      padding: 14px 16px 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .sum-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 8px;
      text-align: center;
    }
    .sum-val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .sum-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; }
    .sum-card.bajo .sum-val  { color: var(--amber); }
    .sum-card.agot .sum-val  { color: var(--red); }

    .searchbar {
      padding: 12px 16px;
      display: flex; gap: 8px;
    }
    .searchbar input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
    }
    .searchbar input:focus {
      outline: none; border-color: var(--accent);
    }
    .filter-chips {
      display: flex; gap: 6px; padding: 0 16px 12px; overflow-x: auto;
    }
    .chip {
      flex-shrink: 0;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 99px;
      color: var(--text2);
      background: var(--bg2);
      cursor: pointer;
      white-space: nowrap;
    }
    .chip.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .list {
      padding: 0 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .prod-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      cursor: pointer;
      transition: border-color 0.12s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .prod-card:active { border-color: var(--accent); }
    .prod-card-left { flex: 1; min-width: 0; }
    .prod-name {
      font-size: 14px; font-weight: 700; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .prod-ia {
      font-size: 11px; color: var(--text3); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .prod-subcat {
      display: inline-block;
      font-size: 10px; font-weight: 600;
      color: var(--text3);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 7px;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .prod-card-right { text-align: right; flex-shrink: 0; }
    .prod-stock-val {
      font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--green);
      line-height: 1;
    }
    .prod-stock-val.bajo { color: var(--amber); }
    .prod-stock-unit { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .prod-stock-min { font-size: 10px; color: var(--text3); margin-top: 1px; }

    .empty {
      text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px;
    }

    /* ── FAB / bottom actions ── */
    .fab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
      display: flex; gap: 8px; z-index: 40;
    }
    .fab-btn {
      flex: 1;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .fab-btn.secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none; align-items: flex-end; justify-content: center;
      z-index: 100;
    }
    .overlay.visible { display: flex; }
    .modal {
      width: 100%; max-width: 560px;
      background: var(--bg2);
      border-radius: 16px 16px 0 0;
      padding: 18px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .modal-sub   { font-size: 12px; color: var(--text3); margin-bottom: 14px; }
    .modal-field { margin-bottom: 10px; }
    .modal-field label {
      font-size: 11px; color: var(--text3); text-transform: uppercase;
      letter-spacing: 0.3px; display: block; margin-bottom: 4px;
    }
    .modal-field input, .modal-field select, .modal-field textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
    }
    .modal-field textarea { resize: none; min-height: 60px; font-family: inherit; }
    .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-cancel, .btn-ok {
      flex: 1; padding: 12px; border-radius: var(--radius);
      border: none; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-cancel { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn-ok     { background: var(--accent); color: #000; }
    .btn-ok:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      padding: 10px 16px; border-radius: 99px; font-size: 13px;
      z-index: 200;
      opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.visible { opacity: 1; }
    .toast.ok    { border-color: var(--green); color: #6ee7b7; }
    .toast.error { border-color: var(--red);   color: #fca5a5; }

    .loader {
      text-align: center; padding: 30px; color: var(--text3); font-size: 13px;
    }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <a class="header-back" href="app.html">←</a>
  <div class="header-brand">
    <div class="header-empresa">La <span>Quinta</span></div>
    <div class="header-predio">Inventario · Stock de productos</div>
  </div>
</div>

<div class="summary">
  <div class="sum-card">
    <div class="sum-val" id="sumTotal">—</div>
    <div class="sum-lbl">Productos</div>
  </div>
  <div class="sum-card bajo">
    <div class="sum-val" id="sumBajo">—</div>
    <div class="sum-lbl">Stock bajo</div>
  </div>
  <div class="sum-card agot">
    <div class="sum-val" id="sumAgot">—</div>
    <div class="sum-lbl">Agotados</div>
  </div>
</div>

<div class="searchbar">
  <input type="text" id="searchInput" placeholder="Buscar producto..." />
</div>

<div class="filter-chips" id="chipsGrupo"></div>
<div class="filter-chips" id="chipsSubcat" style="display:none;padding-top:0"></div>

<div class="list" id="listContainer">
  <div class="loader"><span class="spin">⏳</span> Cargando inventario...</div>
</div>

<div class="fab-bar">
  <button class="fab-btn secondary" onclick="abrirHistorial()">📋 Historial</button>
</div>

<!-- Modal consumo -->
<div class="overlay" id="modalOverlay" onclick="cerrarModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle">Registrar consumo</div>
    <div class="modal-sub"   id="modalSub">—</div>

    <div class="modal-field">
      <label>Producto</label>
      <select id="mProducto"></select>
    </div>
    <div class="modal-field">
      <label>Cantidad consumida</label>
      <input type="number" step="0.01" min="0" id="mCantidad" placeholder="0.00" inputmode="decimal">
    </div>
    <div class="modal-field">
      <label>Fecha</label>
      <input type="date" id="mFecha">
    </div>
    <div class="modal-field">
      <label>Cuartel</label>
      <select id="mCuartel">
        <option value="">— seleccionar —</option>
        <option>C2</option>
        <option>C3</option>
        <option>C4</option>
        <option>General</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Operación</label>
      <select id="mOperacion">
        <option value="">— seleccionar —</option>
        <option>Fitosanitario</option>
        <option>Fertirriego</option>
        <option>Foliar</option>
        <option>Herbicida</option>
        <option>Aplicación biológica</option>
        <option>Bioestimulante</option>
        <option>Regulador crecimiento</option>
        <option>Post-cosecha</option>
        <option>Otro</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Notas (opcional)</label>
      <textarea id="mNotas" placeholder="Mezcla, dosis aplicada, etc."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-ok" id="btnGuardarConsumo" onclick="guardarConsumo()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL     = 'https://script.google.com/macros/s/AKfycbydi5imjeA5bXY5TlA7MBVGkG6-Aq4XhYC0soXGPUMl41lEvdL8rc-xhjeRv9m0_aJg/exec';
// GAS_TOKEN deprecated — auth via Supabase JWT (window.lqGetIdToken())

const state = {
  inventario: [],
  productos:  [],
  filtroGrupo:  'todos',
  filtroSubcat: 'todas',
  busqueda:   '',
  seleccionado: null,
  gps: null
};

// ── Categorización (igual que el dashboard) ──
const _GRUPOS_ORDEN = ['Plaguicidas','Fertilizantes','Coadyuvantes','EPP','Maquinaria','Envases y Otros'];

function _grupoInv(p) {
  const cat   = (p._categoria || p.categoria || '').toLowerCase();
  const notas = ((p._notas || p.notas || '') + ' ' + (p.ubicacion || '')).toLowerCase();
  const nombre = (p.nombre_comercial || '').toLowerCase();
  if (cat === 'otro' || cat === '' || cat === 'otros') {
    if (/\bepp\b/.test(notas)) return 'EPP';
    if (/tractor|moto|maquinaria/.test(notas) || /\baceite\b|\bgrasa\b|\brefrigerante\b|\bfiltro\b/.test(nombre)) return 'Maquinaria';
    return 'Envases y Otros';
  }
  if (['fungicida','insecticida','acaricida','herbicida','nematicida','post-cosecha','biológico','biologico','regulador'].includes(cat)) return 'Plaguicidas';
  if (['fertilizante foliar','fertirriego','bioestimulante'].includes(cat)) return 'Fertilizantes';
  if (cat === 'coadyuvante') return 'Coadyuvantes';
  return 'Envases y Otros';
}

function _subGrupoInv(p) {
  const cat = (p._categoria || p.categoria || '').toLowerCase();
  const g = _grupoInv(p);
  if (g === 'Plaguicidas') {
    if (cat === 'fungicida')    return 'Fungicidas';
    if (cat === 'insecticida')  return 'Insecticidas';
    if (cat === 'acaricida')    return 'Acaricidas';
    if (cat === 'herbicida')    return 'Herbicidas';
    if (cat === 'nematicida')   return 'Nematicidas';
    if (cat === 'post-cosecha') return 'Post-cosecha';
    if (cat === 'regulador')    return 'Reguladores';
    if (cat === 'biológico' || cat === 'biologico') return 'Biológicos';
    return 'Otros';
  }
  if (g === 'Fertilizantes') {
    if (cat === 'fertilizante foliar') return 'Foliares';
    if (cat === 'fertirriego')         return 'Fertirriego';
    if (cat === 'bioestimulante')      return 'Bioestimulantes';
    return 'Otros';
  }
  return null;
}

// Formato nombre: title case + elementos químicos + siglas de formulación
const _CODIGOS_FORM = new Set(['WP','EC','SL','SC','WG','SP','EW','CS','ME','DF','OD','AS','FS','GR','ES','DP','WDG','OL','SG','WS','SE','LS','EG','UL','CG','AP','TP','BR','PA','WDC','ZC']);
const _ELEM_MAP = {};
['Na','Mg','Ca','Mn','Fe','Zn','Cu','Al','Si','Mo','Co','Ni','Cr','B','K','P','N','S','Cl','Br','I'].forEach(e => { _ELEM_MAP[e.toUpperCase()] = e; });
const _LOWER_ART = new Set(['de','del','la','las','el','los','y','o','con','sin','en']);

function _fmtNombre(s) {
  if (!s) return '';
  return String(s).split(/(\s+)/).map(tok => {
    if (!tok || /^\s+$/.test(tok)) return tok;
    const up = tok.toUpperCase();
    if (_CODIGOS_FORM.has(up)) return up;
    if (tok.length <= 2 && _ELEM_MAP[up]) return _ELEM_MAP[up];
    if (/\d/.test(tok)) {
      return tok.replace(/([a-zA-ZáéíóúñÁÉÍÓÚÑ]+)/g, sub => {
        const su = sub.toUpperCase();
        if (_CODIGOS_FORM.has(su)) return su;
        if (sub.length <= 2 && _ELEM_MAP[su]) return _ELEM_MAP[su];
        return sub.charAt(0).toUpperCase() + sub.slice(1).toLowerCase();
      });
    }
    if (_LOWER_ART.has(tok.toLowerCase())) return tok.toLowerCase();
    return tok.charAt(0).toUpperCase() + tok.slice(1).toLowerCase();
  }).join('');
}

function _fmtStock(n) {
  const num = Number(n) || 0;
  if (Number.isInteger(num)) return num.toLocaleString('es-CL');
  return num.toLocaleString('es-CL', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
}

function esc(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg, tipo){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast visible ' + (tipo||'');
  clearTimeout(t._to);
  t._to = setTimeout(()=> t.classList.remove('visible'), 3000);
}

async function cargarDatos(){
  try {
    const [invRes, prodRes] = await Promise.all([
      fetch(`${GAS_URL}?action=list_inventario&_=${Date.now()}`),
      fetch(`${GAS_URL}?action=list_productos&_=${Date.now()}`)
    ]);
    const inv  = await invRes.json();
    const prod = await prodRes.json();
    state.inventario = inv.inventario || [];
    state.productos  = prod.productos  || [];
    // Solo adjuntar categoría a items que ya tienen stock
    const prodMap = {};
    state.productos.forEach(p => { prodMap[p.codigo] = p; });
    state.inventario.forEach(item => {
      const p = prodMap[item.codigo];
      if (p) item.categoria = p.categoria;
    });
    // Solo mostrar productos con existencia real (stock_actual > 0)
    state.inventario = state.inventario.filter(i => (Number(i.stock_actual) || 0) > 0);
    render();
  } catch(err) {
    document.getElementById('listContainer').innerHTML =
      '<div class="empty">⚠️ Error al cargar. Revisa conexión.<br><br>'+esc(err.toString())+'</div>';
  }
}

function _renderChips() {
  // Grupo chips
  const grupoCount = {};
  state.inventario.forEach(p => {
    const g = _grupoInv(p);
    grupoCount[g] = (grupoCount[g] || 0) + 1;
  });
  const bajo = state.inventario.filter(i => {
    const s = Number(i.stock_actual || 0), m = Number(i.stock_minimo || 0);
    return m > 0 && s <= m;
  }).length;

  let html = `<div class="chip ${state.filtroGrupo==='todos'?'active':''}" onclick="setGrupo('todos')">Todos (${state.inventario.length})</div>`;
  if (bajo > 0) html += `<div class="chip ${state.filtroGrupo==='bajo_stock'?'active':''}" onclick="setGrupo('bajo_stock')">⚠ Bajo stock (${bajo})</div>`;
  _GRUPOS_ORDEN.forEach(g => {
    const n = grupoCount[g] || 0;
    if (!n) return;
    html += `<div class="chip ${state.filtroGrupo===g?'active':''}" onclick="setGrupo('${g}')">${g} (${n})</div>`;
  });
  document.getElementById('chipsGrupo').innerHTML = html;

  // Subcat chips (solo Plaguicidas y Fertilizantes)
  const subcatEl = document.getElementById('chipsSubcat');
  if (state.filtroGrupo === 'Plaguicidas' || state.filtroGrupo === 'Fertilizantes') {
    const subCount = {};
    state.inventario.filter(p => _grupoInv(p) === state.filtroGrupo).forEach(p => {
      const s = _subGrupoInv(p) || 'Otros';
      subCount[s] = (subCount[s] || 0) + 1;
    });
    const total = Object.values(subCount).reduce((a,b)=>a+b,0);
    let sh = `<div class="chip ${state.filtroSubcat==='todas'?'active':''}" onclick="setSubcat('todas')">Todos (${total})</div>`;
    Object.keys(subCount).sort().forEach(s => {
      sh += `<div class="chip ${state.filtroSubcat===s?'active':''}" onclick="setSubcat('${s}')">${s} (${subCount[s]})</div>`;
    });
    subcatEl.innerHTML = sh;
    subcatEl.style.display = '';
  } else {
    subcatEl.style.display = 'none';
    subcatEl.innerHTML = '';
  }
}

function setGrupo(g) {
  state.filtroGrupo = g;
  state.filtroSubcat = 'todas';
  render();
}
function setSubcat(s) {
  state.filtroSubcat = s;
  render();
}

function render(){
  let items = state.inventario.slice();

  // Filtro grupo
  if (state.filtroGrupo === 'bajo_stock') {
    items = items.filter(i => {
      const s = Number(i.stock_actual || 0), m = Number(i.stock_minimo || 0);
      return m > 0 && s <= m;
    });
  } else if (state.filtroGrupo !== 'todos') {
    items = items.filter(i => _grupoInv(i) === state.filtroGrupo);
  }

  // Filtro subcategoría
  if (state.filtroSubcat !== 'todas') {
    items = items.filter(i => (_subGrupoInv(i) || 'Otros') === state.filtroSubcat);
  }

  // Búsqueda
  const q = state.busqueda.toLowerCase().trim();
  if (q) {
    items = items.filter(i =>
      (i.nombre_comercial||'').toLowerCase().includes(q) ||
      (i.codigo||'').toLowerCase().includes(q) ||
      (i._ingrediente||'').toLowerCase().includes(q)
    );
  }

  // Orden: bajo stock primero, luego alfabético
  items.sort((a,b) => {
    const bajA = (Number(a.stock_minimo||0) > 0 && Number(a.stock_actual||0) <= Number(a.stock_minimo||0)) ? 0 : 1;
    const bajB = (Number(b.stock_minimo||0) > 0 && Number(b.stock_actual||0) <= Number(b.stock_minimo||0)) ? 0 : 1;
    if (bajA !== bajB) return bajA - bajB;
    return (a.nombre_comercial||'').localeCompare(b.nombre_comercial||'');
  });

  // Resumen
  document.getElementById('sumTotal').textContent = state.inventario.length;
  const bajoCnt = state.inventario.filter(i => {
    const s = Number(i.stock_actual||0), m = Number(i.stock_minimo||0);
    return m > 0 && s <= m;
  }).length;
  document.getElementById('sumBajo').textContent = bajoCnt;
  document.getElementById('sumAgot').textContent = state.inventario.filter(i => i.estado === 'AGOTADO' || i.estado === 'DESCUADRE').length;

  _renderChips();

  const cont = document.getElementById('listContainer');
  if (!items.length) {
    cont.innerHTML = '<div class="empty">📭 Sin productos para mostrar</div>';
    return;
  }

  cont.innerHTML = items.map(i => {
    const s = Number(i.stock_actual || 0);
    const m = Number(i.stock_minimo || 0);
    const esBajo = m > 0 && s <= m;
    const nombre = _fmtNombre(i.nombre_comercial);
    const ia = _fmtNombre(i._ingrediente || '');
    const subcat = _subGrupoInv(i) || _grupoInv(i);
    const stockStr = _fmtStock(s);
    const stockColor = esBajo ? 'bajo' : '';
    return `
    <div class="prod-card" onclick="abrirModalConsumo('${esc(i.codigo)}')">
      <div class="prod-card-left">
        <div class="prod-name">${esc(nombre)}</div>
        ${ia ? `<div class="prod-ia">${esc(ia)}</div>` : ''}
        <span class="prod-subcat">${esc(subcat)}</span>
      </div>
      <div class="prod-card-right">
        <div class="prod-stock-val ${stockColor}">${stockStr}</div>
        <div class="prod-stock-unit">${esc(i.unidad || '')}</div>
        ${m > 0 ? `<div class="prod-stock-min">mín ${_fmtStock(m)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function fmtNum(n){
  const x = Number(n) || 0;
  return Number.isInteger(x) ? x.toString() : x.toFixed(2);
}

function fmtFecha(f){
  if (!f) return '';
  const d = new Date(f);
  if (isNaN(d.getTime())) return String(f).substring(0,10);
  return d.toLocaleDateString('es-CL');
}

function abrirModalConsumo(codigo){
  const item = state.inventario.find(i => i.codigo === codigo);
  state.seleccionado = codigo;
  llenarProductosSelect(codigo);
  document.getElementById('modalTitle').textContent = 'Registrar consumo';
  document.getElementById('modalSub').textContent   =
    item ? `Stock actual: ${_fmtStock(item.stock_actual)} ${item.unidad}` : '';
  document.getElementById('mCantidad').value = '';
  document.getElementById('mFecha').value    = new Date().toISOString().slice(0,10);
  document.getElementById('mCuartel').value  = '';
  document.getElementById('mOperacion').value = '';
  document.getElementById('mNotas').value    = '';
  document.getElementById('modalOverlay').classList.add('visible');
}

function abrirModalConsumoLibre(){
  abrirModalConsumo(state.inventario[0]?.codigo || '');
}

function llenarProductosSelect(codigoSel){
  const sel = document.getElementById('mProducto');
  const opts = state.inventario.slice().sort((a,b)=> (a.nombre_comercial||'').localeCompare(b.nombre_comercial||''));
  sel.innerHTML = opts.map(i =>
    `<option value="${esc(i.codigo)}" ${i.codigo===codigoSel?'selected':''}>${esc(_fmtNombre(i.nombre_comercial))} (${_fmtStock(i.stock_actual)} ${esc(i.unidad)})</option>`
  ).join('');
}

function cerrarModal(e){
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('visible');
}

async function guardarConsumo(){
  const btn = document.getElementById('btnGuardarConsumo');
  const codigo = document.getElementById('mProducto').value;
  const cantidad = parseFloat(document.getElementById('mCantidad').value);
  const fecha = document.getElementById('mFecha').value;
  const cuartel = document.getElementById('mCuartel').value;
  const operacion = document.getElementById('mOperacion').value;
  const notas = document.getElementById('mNotas').value.trim();

  if (!codigo) { toast('Selecciona un producto', 'error'); return; }
  if (!cantidad || cantidad <= 0) { toast('Cantidad inválida', 'error'); return; }
  if (!fecha) { toast('Falta la fecha', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Guardando...';

  const payload = {
    idToken: window.lqGetIdToken(),
    action: 'add_consumo',
    codigo, cantidad, fecha, cuartel, operacion, notas,
    usuario: (window.LQ_AUTH_USER || 'equipo')
  };
  if (state.gps) {
    payload.gps_lat = state.gps.lat;
    payload.gps_lng = state.gps.lng;
  }

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    toast('✅ Consumo registrado', 'ok');
    cerrarModal();
    setTimeout(cargarDatos, 800);
  } catch(err) {
    toast('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar';
  }
}

function abrirHistorial(){
  window.location.href = 'inventario_historial.html';
}

// GPS silencioso en segundo plano
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => { state.gps = { lat: pos.coords.latitude, lng: pos.coords.longitude }; },
    err => {},
    { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
  );
}

// Eventos
document.getElementById('searchInput').addEventListener('input', e => {
  state.busqueda = e.target.value;
  render();
});
// Chips generados dinámicamente en _renderChips() — no se necesita listener estático

cargarDatos();
</script>
