<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <title>Registro de Personal · Panel</title>
  <meta name="theme-color" content="#0f1117">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0f1117; --bg2: #161b24; --bg3: #1e2534;
      --border: rgba(255,255,255,0.08);
      --text:   #f0f2f5; --text2: #8b93a5; --text3: #555e70;
      --accent: #3b82f6; --green: #10b981; --red: #ef4444; --radius: 12px;
    }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,'Segoe UI',sans-serif; min-height:100vh; }
    header {
      background:var(--bg2); border-bottom:1px solid var(--border);
      padding:0 1.5rem; height:60px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .header-left { display:flex; align-items:center; gap:12px; }
    .btn-back {
      display:flex; align-items:center; justify-content:center;
      width:34px; height:34px; border-radius:8px;
      background:var(--bg3); border:1px solid var(--border);
      color:var(--text2); font-size:18px; text-decoration:none;
    }
    .header-title { font-size:16px; font-weight:700; }
    .header-sub   { font-size:11px; color:var(--text3); margin-top:1px; }
    .main { max-width:1300px; margin:0 auto; padding:1.5rem; }
    .toolbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:1rem; }
    .search-box {
      flex:1; max-width:320px;
      background:var(--bg2); border:1px solid var(--border); border-radius:8px;
      color:var(--text); font-size:13px; padding:8px 12px; font-family:inherit;
    }
    .search-box:focus { outline:none; border-color:var(--accent); }
    .search-box::placeholder { color:var(--text3); }
    .info-text { font-size:13px; color:var(--text3); }
    .btn {
      padding:8px 16px; border-radius:8px; border:none;
      font-size:13px; font-weight:600; cursor:pointer;
      display:inline-flex; align-items:center; gap:6px; transition:opacity .12s;
    }
    .btn:active { opacity:.8; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-ghost   { background:var(--bg3); border:1px solid var(--border); color:var(--text2); }

    /* ── Tabla ── */
    .pt-wrap { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .personas-table { width:100%; border-collapse:collapse; background:var(--bg2); }
    .personas-table thead th {
      padding:10px 12px; text-align:left;
      font-size:11px; font-weight:600; text-transform:uppercase;
      letter-spacing:.4px; color:var(--text3);
      background:var(--bg3); border-bottom:1px solid var(--border);
      white-space:nowrap; user-select:none;
    }
    .personas-table thead th.sortable { cursor:pointer; }
    .personas-table thead th.sortable:hover { color:var(--text2); }
    .sort-arrow { font-size:10px; margin-left:4px; opacity:.4; }
    .sort-arrow.on { opacity:1; color:var(--accent); }
    .personas-table td {
      padding:9px 12px; font-size:13px;
      border-bottom:1px solid var(--border); vertical-align:middle;
    }
    .personas-table tr:last-child td { border-bottom:none; }
    .personas-table tbody tr.main-row:hover td { background:rgba(255,255,255,.015); }

    /* Celda editable */
    td[data-eid] { cursor:pointer; }
    td[data-eid]:hover { background:rgba(59,130,246,.05); }
    .cv { display:block; }
    .cv.empty { color:var(--text3); font-style:italic; }

    /* Celda tipo select — con flecha indicadora */
    td[data-eid][data-type="select"] {
      position: relative;
    }
    td[data-eid][data-type="select"] .cv::after {
      content: ' ▾';
      font-size: 9px;
      color: var(--text3);
      opacity: 0.7;
    }
    td[data-eid][data-type="select"]:hover .cv::after {
      color: var(--accent);
      opacity: 1;
    }
    /* Celdas select en fila extra también */
    span[data-eid][data-type="select"]::after {
      content: ' ▾';
      font-size: 9px;
      color: var(--text3);
    }

    /* Input inline */
    .ei {
      background:var(--bg3); border:1px solid var(--accent);
      border-radius:5px; color:var(--text); font-size:12px;
      padding:4px 8px; font-family:inherit; width:100%; min-width:90px;
    }
    .ei:focus { outline:none; }

    /* Barra completitud */
    .pct-bar { display:inline-block; width:44px; height:5px; background:var(--bg3); border-radius:99px; overflow:hidden; vertical-align:middle; }
    .pct-fill { height:100%; border-radius:99px; background:var(--green); }

    /* Fila expandida */
    .row-extra { display:none; background:rgba(59,130,246,.03); }
    .row-extra.open { display:table-row; }
    .row-extra td { padding:12px 16px; border-bottom:1px solid var(--border); }
    .extra-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; }
    .extra-field label {
      display:block; font-size:10px; color:var(--text3);
      text-transform:uppercase; letter-spacing:.3px; margin-bottom:4px;
    }

    .btn-expand {
      width:22px; height:22px; border-radius:4px;
      background:transparent; border:1px solid var(--border);
      color:var(--text3); font-size:11px; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center; transition:all .12s;
    }
    .btn-expand:hover { background:var(--bg3); color:var(--text); }
    .btn-expand.open { background:var(--bg3); color:var(--accent); border-color:rgba(59,130,246,.3); }

    .empty-state { text-align:center; padding:3rem 1rem; color:var(--text3); font-size:14px; }

    /* Modal */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.75);
      display:none; align-items:center; justify-content:center; z-index:100; padding:1rem;
    }
    .overlay.visible { display:flex; }
    .modal {
      background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
      padding:1.5rem; width:100%; max-width:560px; max-height:90vh; overflow-y:auto;
    }
    .modal-title { font-size:17px; font-weight:700; margin-bottom:1.2rem; }
    .mfield { margin-bottom:11px; }
    .mfield label { display:block; font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.3px; margin-bottom:4px; }
    .mfield input, .mfield select {
      width:100%; background:var(--bg3); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-size:13px;
      padding:9px 12px; font-family:inherit;
    }
    .mfield input:focus, .mfield select:focus { outline:none; border-color:var(--accent); }
    .mrow { display:flex; gap:8px; }
    .mrow > * { flex:1; }
    .modal-footer { display:flex; gap:8px; margin-top:1.2rem; }
    .modal-footer .btn { flex:1; justify-content:center; padding:11px; }
    .sec { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase;
      letter-spacing:.5px; margin:14px 0 8px; border-top:1px solid var(--border); padding-top:12px; }

    .toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:var(--bg3); border:1px solid var(--border); color:var(--text);
      padding:10px 18px; border-radius:99px; font-size:13px;
      z-index:300; opacity:0; transition:opacity .2s; pointer-events:none;
    }
    .toast.visible { opacity:1; }
    .toast.ok    { border-color:var(--green); color:#6ee7b7; }
    .toast.error { border-color:var(--red);   color:#fca5a5; }
    .hint { font-size:11px; color:var(--text3); margin-top:8px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="btn-back" href="index.html">←</a>
    <div>
      <div class="header-title">Registro de Personal</div>
      <div class="header-sub">Ficha personal · Clic en celda para editar · ▸ para campos adicionales</div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="abrirNuevo()">+ Nuevo</button>
</header>

<div class="main">
  <div class="toolbar">
    <input class="search-box" id="searchBox" placeholder="Buscar nombre o RUT…" oninput="renderTabla()">
    <div class="info-text" id="infoCount">— cargando —</div>
  </div>
  <div id="tablaContainer"><div class="empty-state">Cargando…</div></div>
</div>

<!-- Modal nuevo -->
<div class="overlay" id="overlayNuevo" onclick="if(event.target===this)cerrarNuevo()">
  <div class="modal">
    <div class="modal-title">Nuevo registro de personal</div>
    <div class="mrow">
      <div class="mfield"><label>Nombre completo *</label>
        <input id="mNombre" type="text" autocapitalize="words" placeholder="Juan Pérez"></div>
      <div class="mfield"><label>RUT</label>
        <input id="mRut" type="text" placeholder="12.345.678-9"></div>
    </div>
    <div class="sec">Previsión</div>
    <div class="mrow">
      <div class="mfield"><label>AFP</label>
        <select id="mAfp">
          <option value="">— sin datos —</option>
          <option>AFP Habitat</option><option>AFP Capital</option><option>AFP Cuprum</option>
          <option>AFP Modelo</option><option>AFP Planvital</option><option>AFP ProVida</option><option>AFP Uno</option>
        </select></div>
      <div class="mfield"><label>Fonasa / ISAPRE</label>
        <select id="mIsapre">
          <option value="">— sin datos —</option>
          <option>Fonasa</option><option>Consalud</option><option>Banmédica</option>
          <option>Cruz Blanca</option><option>Colmena</option><option>Nueva Masvida</option><option>Vida Tres</option>
        </select></div>
    </div>
    <div class="mfield" style="max-width:140px"><label>Cargas familiares</label>
      <input id="mCargas" type="number" min="0" value="0"></div>
    <div class="sec">Cuenta bancaria</div>
    <div class="mrow">
      <div class="mfield"><label>Banco</label>
        <select id="mBanco">
          <option value="">— sin datos —</option>
          <option>Banco Estado</option><option>BCI</option><option>Santander</option>
          <option>Banco de Chile</option><option>Scotiabank</option><option>Itaú</option>
          <option>BICE</option><option>Security</option><option>Falabella</option><option>Ripley</option>
        </select></div>
      <div class="mfield"><label>Tipo de cuenta</label>
        <select id="mTipoCuenta" onchange="autoFillCuentaRut()">
          <option value="">— sin datos —</option>
          <option>Cuenta Corriente</option><option>Cuenta Vista</option><option>Cuenta RUT</option>
        </select></div>
    </div>
    <div class="mfield"><label>Número de cuenta</label>
      <input id="mCuenta" type="text" placeholder="Ej: 12345678"></div>
    <div class="sec">Contacto</div>
    <div class="mrow">
      <div class="mfield"><label>Email</label>
        <input id="mEmail" type="email" placeholder="correo@mail.com"></div>
      <div class="mfield"><label>Teléfono</label>
        <input id="mTelefono" type="tel" placeholder="+56 9 1234 5678"></div>
    </div>
    <div class="mfield"><label>Dirección</label>
      <input id="mDireccion" type="text" placeholder="Calle y número, ciudad"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarNuevo()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarNuevo()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL   = 'https://eunuqwzrbqqpykyywjbu.supabase.co';
const SUPA_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1bnVxd3pyYnFxcHlreXl3amJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzYyOTMsImV4cCI6MjA5MTM1MjI5M30.iiCd-6pa8mQgXR6DzMtZjGsJnn-8OD_-ayrRtXj-YkM';
const EMPRESA_ID = 1;

const OPTS = {
  afp:          ['AFP Habitat','AFP Capital','AFP Cuprum','AFP Modelo','AFP Planvital','AFP ProVida','AFP Uno'],
  isapre_fonasa:['Fonasa','Consalud','Banmédica','Cruz Blanca','Colmena','Nueva Masvida','Vida Tres'],
  banco:        ['Banco Estado','BCI','Santander','Banco de Chile','Scotiabank','Itaú','BICE','Security','Falabella','Ripley'],
  tipo_cuenta:  ['Cuenta Corriente','Cuenta Vista','Cuenta RUT']
};

let _personas = [];
let _sortCol  = 'nombre';
let _sortDir  = 'asc';
let _expanded = new Set();

// ── API ────────────────────────────────────────────────────────────
const _H = { apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json', Accept:'application/json' };
async function _get(q)      { const r=await fetch(`${SUPA_URL}/rest/v1/${q}`,{headers:_H}); if(!r.ok)throw new Error(await r.text()); return r.json(); }
async function _post(t,d)   { const r=await fetch(`${SUPA_URL}/rest/v1/${t}`,{method:'POST',headers:{..._H,Prefer:'return=representation'},body:JSON.stringify(d)}); if(!r.ok)throw new Error(await r.text()); return r.json(); }
async function _patch(id,d) { const r=await fetch(`${SUPA_URL}/rest/v1/personas?id=eq.${id}`,{method:'PATCH',headers:{..._H,Prefer:'return=minimal'},body:JSON.stringify(d)}); if(!r.ok)throw new Error(await r.text()); }

// ── Carga ──────────────────────────────────────────────────────────
async function cargar() {
  try {
    _personas = await _get(`personas?empresa_id=eq.${EMPRESA_ID}&order=nombre.asc&select=*`);
    renderTabla();
  } catch(e) {
    document.getElementById('tablaContainer').innerHTML = `<div class="empty-state" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

// ── Helpers ────────────────────────────────────────────────────────
function _tc(s) {
  if (!s) return '';
  const skip = new Set(['de','del','la','las','los','el','y','e','o']);
  return String(s).toLowerCase().replace(/\S+/g,(w,i)=>(i===0||!skip.has(w))?w[0].toUpperCase()+w.slice(1):w);
}
function _pct(p) {
  const fields=['rut','afp','isapre_fonasa','banco','cuenta_bancaria','email','telefono'];
  return Math.round(fields.filter(f=>p[f]!=null&&p[f]!=='').length/fields.length*100);
}
function _rutToAccount(rut) { return (rut||'').replace(/\./g,'').split('-')[0].trim(); }
function _si(col) {
  if (_sortCol!==col) return '<span class="sort-arrow">↕</span>';
  return `<span class="sort-arrow on">${_sortDir==='asc'?'↑':'↓'}</span>`;
}
function sortBy(col) {
  _sortDir = _sortCol===col ? (_sortDir==='asc'?'desc':'asc') : 'asc';
  _sortCol = col;
  renderTabla();
}

// ── Render ─────────────────────────────────────────────────────────
function _cv(v, empty='—') {
  const s = (v!==null&&v!==undefined&&v!=='') ? String(v) : null;
  return `<span class="cv${s?'':' empty'}">${s||empty}</span>`;
}
function _td(pid, field, display, type) {
  // type: 'text'|'number'|'date'|'select'
  return `<td data-eid="${pid}" data-field="${field}" data-type="${type||'text'}">${display}</td>`;
}

function renderTabla() {
  const q = (document.getElementById('searchBox').value||'').toLowerCase();
  let rows = _personas.filter(p => !q ||
    (p.nombre||'').toLowerCase().includes(q) ||
    (p.rut||'').toLowerCase().includes(q)
  );
  rows.sort((a,b)=>{
    let va=a[_sortCol]??'', vb=b[_sortCol]??'';
    if(typeof va==='string') va=va.toLowerCase();
    if(typeof vb==='string') vb=vb.toLowerCase();
    return va<vb?(_sortDir==='asc'?-1:1):va>vb?(_sortDir==='asc'?1:-1):0;
  });

  document.getElementById('infoCount').textContent = `${rows.length} persona${rows.length!==1?'s':''}`;
  const cont = document.getElementById('tablaContainer');
  if (!rows.length) { cont.innerHTML='<div class="pt-wrap"><div class="empty-state">Sin resultados.</div></div>'; return; }

  const html = rows.map(p => {
    const exp = _expanded.has(p.id);
    const pct = _pct(p);
    const mainRow = `<tr class="main-row">
      <td><button class="btn-expand${exp?' open':''}" data-expand="${p.id}">${exp?'▾':'▸'}</button></td>
      ${_td(p.id,'nombre', _cv(p.nombre?_tc(p.nombre):null,'Sin nombre'), 'text')}
      ${_td(p.id,'rut',    _cv(p.rut), 'text')}
      ${_td(p.id,'afp',    _cv(p.afp), 'select')}
      ${_td(p.id,'isapre_fonasa', _cv(p.isapre_fonasa), 'select')}
      ${_td(p.id,'banco',  _cv(p.banco), 'select')}
      ${_td(p.id,'tipo_cuenta', _cv(p.tipo_cuenta), 'select')}
      ${_td(p.id,'cuenta_bancaria', _cv(p.cuenta_bancaria), 'text')}
      ${_td(p.id,'email', _cv(p.email), 'text')}
      <td>
        <div style="display:flex;align-items:center;gap:6px" title="${pct}% completado">
          <div class="pct-bar"><div class="pct-fill" style="width:${pct}%"></div></div>
          <span style="font-size:10px;color:var(--text3)">${pct}%</span>
        </div>
      </td>
    </tr>`;

    const extraRow = `<tr class="row-extra${exp?' open':''}" id="extra-${p.id}">
      <td colspan="10">
        <div class="extra-grid">
          <div class="extra-field">
            <label>Teléfono</label>
            <span data-eid="${p.id}" data-field="telefono" data-type="text" class="cv${!p.telefono?' empty':''}" style="cursor:pointer">${p.telefono||'—'}</span>
          </div>
          <div class="extra-field">
            <label>Cargas familiares</label>
            <span data-eid="${p.id}" data-field="cargas" data-type="number" class="cv" style="cursor:pointer">${p.cargas??'—'}</span>
          </div>
          <div class="extra-field">
            <label>Fecha nacimiento</label>
            <span data-eid="${p.id}" data-field="fecha_nacimiento" data-type="date" class="cv${!p.fecha_nacimiento?' empty':''}" style="cursor:pointer">${p.fecha_nacimiento||'—'}</span>
          </div>
          <div class="extra-field" style="grid-column:span 2">
            <label>Dirección</label>
            <span data-eid="${p.id}" data-field="direccion" data-type="text" class="cv${!p.direccion?' empty':''}" style="cursor:pointer">${p.direccion||'—'}</span>
          </div>
        </div>
      </td>
    </tr>`;
    return mainRow + extraRow;
  }).join('');

  cont.innerHTML = `
  <div class="pt-wrap">
  <table class="personas-table">
    <thead><tr>
      <th style="width:34px"></th>
      <th class="sortable" onclick="sortBy('nombre')">NOMBRE ${_si('nombre')}</th>
      <th class="sortable" onclick="sortBy('rut')">RUT ${_si('rut')}</th>
      <th class="sortable" onclick="sortBy('afp')">AFP ${_si('afp')}</th>
      <th class="sortable" onclick="sortBy('isapre_fonasa')">FONASA / ISAPRE ${_si('isapre_fonasa')}</th>
      <th class="sortable" onclick="sortBy('banco')">BANCO ${_si('banco')}</th>
      <th class="sortable" onclick="sortBy('tipo_cuenta')">TIPO CUENTA ${_si('tipo_cuenta')}</th>
      <th>N° CUENTA</th>
      <th>EMAIL</th>
      <th title="% campos completados">FICHA</th>
    </tr></thead>
    <tbody>${html}</tbody>
  </table>
  </div>
  <p class="hint" style="margin-top:8px">💡 Clic en celda para editar · ▸ para teléfono, cargas, fecha nac. y dirección</p>`;
}

// ── Event delegation ───────────────────────────────────────────────
document.addEventListener('click', function(e) {
  // Expand button
  const btn = e.target.closest('button[data-expand]');
  if (btn) {
    const id = parseInt(btn.dataset.expand);
    _expanded.has(id) ? _expanded.delete(id) : _expanded.add(id);
    renderTabla();
    return;
  }

  // Editable cell (td o span con data-eid)
  const el = e.target.closest('[data-eid]');
  if (!el || el.dataset.editing) return;

  const pid   = parseInt(el.dataset.eid);
  const field = el.dataset.field;
  const type  = el.dataset.type || 'text';
  const p     = _personas.find(x => x.id === pid);
  if (!p) return;

  const td = el.tagName === 'TD' ? el : el.closest('td') || el.parentElement;

  if (OPTS[field]) {
    _editSelect(td, el, pid, field, p[field]||'', OPTS[field]);
  } else {
    _editCell(td, el, pid, field, p[field]??'', type);
  }
});

// ── Edición inline ─────────────────────────────────────────────────
// IMPORTANTE: nunca sacar el <td> del DOM — solo reemplazar el span .cv interno.
// Así td.dataset.editing siempre apunta al elemento correcto en el DOM.

function _replaceEl(target) {
  // Si target es un TD, devuelve el span .cv dentro; si es span, lo devuelve directo.
  return (target.tagName === 'TD')
    ? (target.querySelector('.cv') || target.firstElementChild || target)
    : target;
}

function _editCell(td, target, pid, field, value, type) {
  if (td.dataset.editing) return;
  td.dataset.editing = '1';

  const displayEl = _replaceEl(target);
  const origHTML  = displayEl.outerHTML;

  const inp = document.createElement('input');
  inp.className = 'ei';
  inp.type  = (type==='number'||type==='date') ? type : 'text';
  inp.value = value || '';
  if (type==='number') { inp.min='0'; inp.step='1'; }
  if (field==='nombre') inp.setAttribute('autocapitalize','words');

  displayEl.replaceWith(inp);   // solo el span interno, el <td> queda en el DOM
  inp.focus();
  if (inp.select && type!=='date') inp.select();

  const restore = () => {
    inp.replaceWith(document.createRange().createContextualFragment(origHTML));
    delete td.dataset.editing;
  };

  let done = false;
  const save = async () => {
    if (done) return; done = true;
    delete td.dataset.editing;
    let v = inp.value.trim();
    const patch = {};
    if (field==='nombre')        patch.nombre = v.toUpperCase();
    else if (type==='number')    patch[field]  = parseInt(v)||0;
    else                         patch[field]  = v||null;
    try {
      await _patch(pid, patch);
      const p = _personas.find(x=>x.id===pid);
      if (p) Object.assign(p, patch);
      renderTabla(); toast('✓ Guardado','ok');
    } catch(err) {
      restore();
      toast('Error: '+err.message,'error');
    }
  };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e => {
    if (e.key==='Enter')  { e.preventDefault(); inp.blur(); }
    if (e.key==='Escape') { done=true; inp.removeEventListener('blur',save); restore(); }
  });
}

function _editSelect(td, target, pid, field, value, options) {
  if (td.dataset.editing) return;
  td.dataset.editing = '1';

  const displayEl = _replaceEl(target);
  const origHTML  = displayEl.outerHTML;

  const sel = document.createElement('select');
  sel.className = 'ei';
  sel.add(new Option('— sin datos —',''));
  options.forEach(v => { const o=new Option(v,v); if(v===value)o.selected=true; sel.add(o); });

  displayEl.replaceWith(sel);   // solo el span interno
  sel.focus();

  const restore = () => {
    sel.replaceWith(document.createRange().createContextualFragment(origHTML));
    delete td.dataset.editing;
  };

  let done = false;
  const save = async () => {
    if (done) return; done = true;
    delete td.dataset.editing;
    const patch = { [field]: sel.value||null };
    // Auto-fill Cuenta RUT
    if (field==='tipo_cuenta' && sel.value==='Cuenta RUT') {
      const p2 = _personas.find(x=>x.id===pid);
      if (p2 && p2.rut && !p2.cuenta_bancaria) patch.cuenta_bancaria = _rutToAccount(p2.rut);
    }
    try {
      await _patch(pid, patch);
      const p = _personas.find(x=>x.id===pid);
      if (p) Object.assign(p, patch);
      renderTabla(); toast('✓ Guardado','ok');
    } catch(err) {
      restore();
      toast('Error: '+err.message,'error');
    }
  };
  sel.addEventListener('blur', save);
  sel.addEventListener('change', () => sel.blur());
  sel.addEventListener('keydown', e => {
    if (e.key==='Escape') { done=true; sel.removeEventListener('blur',save); restore(); }
  });
}

// ── Modal nuevo ────────────────────────────────────────────────────
function abrirNuevo() {
  ['mNombre','mRut','mCuenta','mEmail','mTelefono','mDireccion'].forEach(id=>document.getElementById(id).value='');
  ['mAfp','mIsapre','mBanco','mTipoCuenta'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mCargas').value='0';
  document.getElementById('overlayNuevo').classList.add('visible');
  setTimeout(()=>document.getElementById('mNombre').focus(),100);
}
function cerrarNuevo() { document.getElementById('overlayNuevo').classList.remove('visible'); }

function autoFillCuentaRut() {
  if (document.getElementById('mTipoCuenta').value==='Cuenta RUT') {
    const rut = document.getElementById('mRut').value.trim();
    const c   = document.getElementById('mCuenta');
    if (rut && !c.value) c.value = _rutToAccount(rut);
  }
}

async function guardarNuevo() {
  const nombre = document.getElementById('mNombre').value.trim();
  if (!nombre) { toast('Ingresa el nombre','error'); return; }
  const payload = {
    empresa_id: EMPRESA_ID,
    nombre:     nombre.toUpperCase(),
    rut:            document.getElementById('mRut').value.trim()||null,
    afp:            document.getElementById('mAfp').value||null,
    isapre_fonasa:  document.getElementById('mIsapre').value||null,
    cargas:         parseInt(document.getElementById('mCargas').value)||0,
    banco:          document.getElementById('mBanco').value||null,
    tipo_cuenta:    document.getElementById('mTipoCuenta').value||null,
    cuenta_bancaria:document.getElementById('mCuenta').value.trim()||null,
    email:          document.getElementById('mEmail').value.trim()||null,
    telefono:       document.getElementById('mTelefono').value.trim()||null,
    direccion:      document.getElementById('mDireccion').value.trim()||null,
  };
  try {
    await _post('personas', payload);
    toast('✅ Persona agregada','ok');
    cerrarNuevo(); await cargar();
  } catch(e) { toast('Error: '+e.message,'error'); }
}

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg,tipo) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast visible '+(tipo||'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('visible'),2500);
}

cargar();
</script>
