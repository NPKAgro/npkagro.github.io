<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Revisión JP · La Quinta</title>
  <script>window.LQ_AUTH_MODE = 'admin';</script>
  <script src="auth.js"></script>
  <style>
    :root {
      --bg:      #0f1117;
      --bg2:     #161b24;
      --bg3:     #1e2534;
      --border:  rgba(255,255,255,0.08);
      --text:    #f0f2f5;
      --text2:   #8b93a5;
      --text3:   #555e70;
      --accent:  #3b82f6;
      --accent2: #1d4ed8;
      --green:   #10b981;
      --amber:   #f59e0b;
      --red:     #ef4444;
      --radius:  12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo-block { display: flex; flex-direction: column; line-height: 1.2; }
    .logo-empresa { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-empresa span { color: #3b82f6; }
    .logo-predio { font-size: 11px; color: var(--text3); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    #fechaHoy { font-size: 12px; color: var(--text3); }

    .controls { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 2rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-label { font-size: 12px; color: var(--text3); }
    .fbtn { font-size: 12px; padding: 5px 14px; border-radius: 99px; cursor: pointer; background: transparent; border: 1px solid var(--border); color: var(--text2); transition: all 0.12s; }
    .fbtn:hover { border-color: rgba(255,255,255,0.2); }
    .fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-reload { margin-left: auto; font-size: 12px; padding: 5px 14px; border-radius: 99px; cursor: pointer; background: transparent; border: 1px solid var(--border); color: var(--text2); transition: all 0.12s; }
    .btn-reload:hover { border-color: rgba(255,255,255,0.2); }

    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 1.25rem 2rem 0; }
    .kpi { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
    .kpi-lbl { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .kpi-val { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }

    .grid-container { padding: 1.25rem 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }

    .obs-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.15s; }
    .obs-card:hover { border-color: rgba(255,255,255,0.14); }
    .card-photo { width: 100%; height: 220px; object-fit: cover; display: block; background: var(--bg3); cursor: zoom-in; }
    .card-photo-placeholder { width: 100%; height: 120px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 36px; color: var(--text3); }
    .card-body { padding: 14px 16px; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .card-loc { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .estado-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 99px; border: 1px solid; white-space: nowrap; }
    .badge-pendiente  { background: rgba(245,158,11,0.15); color: #fcd34d; border-color: rgba(245,158,11,0.3); }
    .badge-revisado   { background: rgba(16,185,129,0.15); color: #6ee7b7; border-color: rgba(16,185,129,0.3); }
    .card-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
    .meta-chip { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 3px; }
    .card-estado { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .card-notas { font-size: 12px; color: var(--text2); line-height: 1.45; margin-bottom: 10px; }
    .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm { font-size: 11px; padding: 5px 12px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text2); transition: all 0.12s; }
    .btn-sm:hover { background: var(--bg3); color: var(--text); }
    .btn-sm.green { border-color: rgba(16,185,129,0.4); color: #6ee7b7; }
    .btn-sm.green:hover { background: rgba(16,185,129,0.1); }
    .btn-sm.amber { border-color: rgba(245,158,11,0.4); color: #fcd34d; }
    .btn-sm.amber:hover { background: rgba(245,158,11,0.1); }
    .btn-sm.red { border-color: rgba(239,68,68,0.4); color: #fca5a5; }
    .btn-sm.red:hover { background: rgba(239,68,68,0.1); }
    .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

    .estado-jp-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 99px; margin-left: 6px; }
    .jp-aprobado    { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
    .jp-con-reparos { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
    .jp-rechazado   { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }

    .state-box { text-align: center; padding: 4rem 2rem; color: var(--text3); }
    .state-box .icon { font-size: 48px; margin-bottom: 12px; }
    .state-box p { font-size: 14px; }

    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 999; justify-content: center; align-items: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 94vw; max-height: 92vh; border-radius: 8px; object-fit: contain; }
    .lightbox-close { position: absolute; top: 16px; right: 20px; font-size: 28px; color: #fff; cursor: pointer; line-height: 1; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 13px; z-index: 500; transition: transform 0.25s ease; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .approve-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 998; align-items: center; justify-content: center; }
    .approve-modal-overlay.open { display: flex; }
    .approve-modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; max-width: 420px; width: 90%; }
    .approve-modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .approve-modal p { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
    .approve-modal .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .approve-modal .btn-row button { flex: 1; min-width: 100px; }
  </style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-empresa">Agrícola <span>del Pedregal</span></div>
    <div class="logo-predio">Panel de Revisión · La Quinta</div>
  </div>
  <div class="header-right">
    <span id="fechaHoy"></span>
  </div>
</header>

<div class="controls">
  <span class="filter-label">Filtro:</span>
  <button class="fbtn active" data-filtro="todos"      onclick="setFiltro(this)">Todos</button>
  <button class="fbtn"        data-filtro="Pendiente"  onclick="setFiltro(this)">⏳ Pendientes</button>
  <button class="fbtn"        data-filtro="Revisado"   onclick="setFiltro(this)">✅ Revisados</button>
  <button class="btn-reload"  onclick="cargar()">↻ Actualizar</button>
</div>

<div class="kpis">
  <div class="kpi"><div class="kpi-lbl">Total</div><div class="kpi-val" id="kTotal">—</div></div>
  <div class="kpi"><div class="kpi-lbl">Pendientes</div><div class="kpi-val" id="kPend">—</div></div>
  <div class="kpi"><div class="kpi-lbl">Revisados</div><div class="kpi-val" id="kRev">—</div></div>
  <div class="kpi"><div class="kpi-lbl">Con foto</div><div class="kpi-val" id="kFotos">—</div></div>
</div>

<div id="gridContainer">
  <div class="state-box"><div class="icon">⏳</div><p>Cargando observaciones...</p></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightboxImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<div class="approve-modal-overlay" id="approveModal">
  <div class="approve-modal">
    <h3>Revisión JP</h3>
    <p>Selecciona el resultado de tu revisión para esta observación:</p>
    <div class="btn-row">
      <button class="btn-sm green" onclick="confirmarAprobacion('Aprobado')">✅ Aprobado</button>
      <button class="btn-sm amber" onclick="confirmarAprobacion('Con reparos')">⚠️ Con reparos</button>
      <button class="btn-sm red"   onclick="confirmarAprobacion('Rechazado')">❌ Rechazado</button>
      <button class="btn-sm"       onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbydi5imjeA5bXY5TlA7MBVGkG6-Aq4XhYC0soXGPUMl41lEvdL8rc-xhjeRv9m0_aJg/exec';
const GAS_TOKEN = 'LQ2026-Santina';

// ── Escape XSS: usar en todo dato del sheet que va a innerHTML ────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const ESTADOS = [
  'Yema dormida', 'Yema hinchada', 'Ramillete expuesto',
  'Botón blanco', 'Inicio floración', 'Plena flor',
  'Caída de pétalos', 'Caída de chaqueta', 'Crecimiento del fruto',
  'Endurecimiento de carozo', 'Color amarillo pajizo', 'Pinta', 'Cosecha',
];

// ── Estado de filtros ────────────────────────────────────────────────
let filtroActual = 'todos';
let obsData      = [];
let filaEnRevision = null;

// ── Fecha ────────────────────────────────────────────────────────────
const hoy = new Date();
document.getElementById('fechaHoy').textContent =
  hoy.toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// ── Carga de datos ───────────────────────────────────────────────────
function cargar() {
  document.getElementById('gridContainer').innerHTML =
    '<div class="state-box"><div class="icon">⏳</div><p>Cargando...</p></div>';

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 15000);

  fetch(`${GAS_URL}?action=list&filtro=todos&_=${Date.now()}`, { signal: controller.signal })
    .then(r => r.json())
    .then(data => {
      clearTimeout(timeout);
      obsData = data.observaciones || [];
      actualizarKPIs();
      renderGrid();
    })
    .catch(err => {
      clearTimeout(timeout);
      document.getElementById('gridContainer').innerHTML =
        `<div class="state-box"><div class="icon">⚠️</div><p>Error al cargar: ${esc(err.message)}<br><small>Revisa tu conexión y recarga.</small></p></div>`;
    });
}

// ── KPIs ─────────────────────────────────────────────────────────────
function actualizarKPIs() {
  document.getElementById('kTotal').textContent  = obsData.length;
  document.getElementById('kPend').textContent   = obsData.filter(o => o.estado_revision === 'Pendiente').length;
  document.getElementById('kRev').textContent    = obsData.filter(o => o.estado_revision === 'Revisado').length;
  document.getElementById('kFotos').textContent  = obsData.filter(o => o.url_foto).length;
}

// ── Filtro ───────────────────────────────────────────────────────────
function setFiltro(btn) {
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtroActual = btn.dataset.filtro;
  renderGrid();
}

// ── Render ───────────────────────────────────────────────────────────
function renderGrid() {
  const lista = filtroActual === 'todos'
    ? obsData
    : obsData.filter(o => o.estado_revision === filtroActual);

  const grid = document.getElementById('gridContainer');

  if (lista.length === 0) {
    grid.innerHTML = '<div class="state-box"><div class="icon">📭</div><p>Sin observaciones para este filtro.</p></div>';
    return;
  }

  grid.innerHTML = '<div class="grid-container">' + lista.map(obs => renderCard(obs)).join('') + '</div>';
}

function renderCard(obs) {
  const fotos = obs.url_foto ? obs.url_foto.split('\n').filter(Boolean) : [];
  const fotoThumb = fotos.length > 0
    ? fotos[0].replace('https://drive.google.com/file/d/', 'https://drive.google.com/thumbnail?id=')
               .replace('/view?usp=drivesdk','&sz=w600').replace('/view','&sz=w600')
    : null;
  const fotoUrl = fotos.length > 0
    ? fotos[0].replace('/view?usp=drivesdk', '/preview').replace('/view', '/preview')
    : null;

  const badgeClass = obs.estado_revision === 'Revisado' ? 'badge-revisado' : 'badge-pendiente';
  const jpBadge = obs.estado_jp
    ? `<span class="estado-jp-badge ${obs.estado_jp === 'Aprobado' ? 'jp-aprobado' : obs.estado_jp === 'Con reparos' ? 'jp-con-reparos' : 'jp-rechazado'}">${esc(obs.estado_jp)}</span>`
    : '';

  return `<div class="obs-card">
    ${fotoThumb
      ? `<img class="card-photo" src="${esc(fotoThumb)}" loading="lazy"
             onclick="openLightbox('${esc(fotoUrl || fotoThumb)}')"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : ''}
    <div class="card-photo-placeholder" style="${fotoThumb ? 'display:none' : ''}">🌸</div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-loc">C${esc(obs.cuartel)} · H${esc(obs.hilera)} · P${esc(obs.planta)}</div>
        <span class="estado-badge ${badgeClass}">${esc(obs.estado_revision)}</span>
      </div>
      <div class="card-meta">
        <span class="meta-chip">📅 ${esc(obs.fecha)}</span>
        <span class="meta-chip">🕐 ${esc(obs.hora)}</span>
        <span class="meta-chip">🍒 ${esc(obs.variedad)}</span>
        ${obs.maps_link ? `<a href="${esc(obs.maps_link)}" target="_blank" class="meta-chip" style="color:var(--accent);text-decoration:none">📍 GPS</a>` : ''}
        ${fotos.length > 1 ? `<span class="meta-chip">🖼 ${fotos.length} fotos</span>` : ''}
      </div>
      <div class="card-estado">Estado: ${esc(obs.estado_campo)}${jpBadge}</div>
      ${obs.notas ? `<div class="card-notas">${esc(obs.notas)}</div>` : ''}
      <div class="card-actions">
        ${obs.maps_link ? `<a href="${esc(obs.maps_link)}" target="_blank"><button class="btn-sm">🗺 Mapa</button></a>` : ''}
        ${obs.url_foto ? `<button class="btn-sm" onclick="eliminarFoto(${obs.fila})">🗑 Foto</button>` : ''}
        <button class="btn-sm green" onclick="abrirModal(${obs.fila})">✅ Revisar</button>
        <button class="btn-sm danger" onclick="eliminarObs(${obs.fila})">🗑 Eliminar</button>
      </div>
    </div>
  </div>`;
}

// ── Lightbox ─────────────────────────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeLightbox(); cerrarModal(); } });

// ── Modal de aprobación ───────────────────────────────────────────────
function abrirModal(fila) {
  filaEnRevision = fila;
  document.getElementById('approveModal').classList.add('open');
}
function cerrarModal() {
  document.getElementById('approveModal').classList.remove('open');
  filaEnRevision = null;
}

function confirmarAprobacion(estadoJP) {
  if (!filaEnRevision) return;
  const fila = filaEnRevision;
  cerrarModal();
  fetch(`${GAS_URL}?action=update&fila=${fila}&estado_aprobado=${encodeURIComponent(estadoJP)}&estado_revision=Revisado&token=${GAS_TOKEN}`)
    .then(() => { mostrarToast('Revisión guardada: ' + estadoJP); cargar(); })
    .catch(() => mostrarToast('Error al guardar revisión'));
}

// ── Eliminar foto ────────────────────────────────────────────────────
function eliminarFoto(fila) {
  if (!confirm('¿Eliminar la foto de esta observación?')) return;
  fetch(`${GAS_URL}?action=deletefoto&fila=${fila}&token=${GAS_TOKEN}`)
    .then(() => { mostrarToast('Foto eliminada'); cargar(); })
    .catch(() => mostrarToast('Error al eliminar foto'));
}

// ── Cambiar estado JP desde select ───────────────────────────────────
function cambiarEstadoJP(fila, nuevoEstado) {
  fetch(`${GAS_URL}?action=update&fila=${fila}&estado_aprobado=${encodeURIComponent(nuevoEstado)}&estado_revision=Revisado&token=${GAS_TOKEN}`)
    .then(() => { mostrarToast('Estado actualizado: ' + nuevoEstado); cargar(); })
    .catch(() => mostrarToast('Error al actualizar'));
}

// ── Eliminar observación ──────────────────────────────────────────────
function eliminarObs(fila) {
  if (!confirm('¿Eliminar esta observación permanentemente?')) return;
  fetch(`${GAS_URL}?action=deleterow&fila=${fila}&token=${GAS_TOKEN}`)
    .then(() => { mostrarToast('Observación eliminada'); cargar(); })
    .catch(() => mostrarToast('Error al eliminar'));
}

// ── Toast ────────────────────────────────────────────────────────────
function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Toast notificaciones por toast ───────────────────────────────────
function t(msg) { mostrarToast(msg); }

// ── Notificaciones de toast helper ───────────────────────────────────
document.getElementById('gridContainer').innerHTML =
  '<div class="state-box"><div class="icon">⏳</div><p>Cargando observaciones...</p></div>';

cargar();
</script>
</body>
</html>
