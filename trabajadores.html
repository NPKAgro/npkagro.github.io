<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <title>Trabajadores · Panel de Registro</title>
  <meta name="theme-color" content="#0f1117">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --bg2:     #161b24;
      --bg3:     #1e2534;
      --border:  rgba(255,255,255,0.08);
      --text:    #f0f2f5;
      --text2:   #8b93a5;
      --text3:   #555e70;
      --accent:  #3b82f6;
      --green:   #10b981;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --radius:  12px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .btn-back {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); font-size: 18px; text-decoration: none;
    }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-sub   { font-size: 11px; color: var(--text3); margin-top: 1px; }

    .main { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }

    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 1rem;
    }
    .toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .info-text { font-size: 13px; color: var(--text3); }

    .btn {
      padding: 8px 16px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.12s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-ghost    { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .filter-tabs { display: flex; gap: 4px; }
    .ftab {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text3); font-size: 12px;
      font-weight: 600; cursor: pointer; transition: all 0.12s;
    }
    .ftab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Tabla ──────────────────────────────────────────────────── */
    .wt-wrap {
      border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    .workers-table {
      width: 100%; border-collapse: collapse; background: var(--bg2);
    }
    /* Fila de cabecera (nombres + sort) */
    .workers-table thead tr.th-names th {
      padding: 10px 12px; text-align: left;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.4px; color: var(--text3);
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }
    .workers-table thead tr.th-names th.sortable {
      cursor: pointer;
    }
    .workers-table thead tr.th-names th.sortable:hover { color: var(--text2); }
    .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.5; }
    .sort-arrow.asc  { opacity: 1; color: var(--accent); }
    .sort-arrow.desc { opacity: 1; color: var(--accent); }

    /* Fila de filtros */
    .workers-table thead tr.th-filters th {
      padding: 6px 8px; background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }
    .th-filter-input, .th-filter-select {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text2); font-size: 11px; padding: 4px 7px;
      font-family: inherit;
    }
    .th-filter-input::placeholder { color: var(--text3); }
    .th-filter-input:focus, .th-filter-select:focus { outline: none; border-color: var(--accent); }

    /* Celdas de datos */
    .workers-table td {
      padding: 10px 12px; font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .workers-table tr:last-child td { border-bottom: none; }
    .workers-table tbody tr:hover td { background: rgba(255,255,255,0.015); }

    /* Inline edit */
    .workers-table td[data-editable] { cursor: pointer; }
    .workers-table td[data-editable]:hover { background: rgba(59,130,246,0.05); }
    .inline-input, .inline-select {
      width: 100%; background: var(--bg3);
      border: 1px solid var(--accent); border-radius: 5px;
      color: var(--text); font-size: 13px; padding: 4px 7px;
      font-family: inherit;
    }
    .inline-input:focus, .inline-select:focus { outline: none; }

    /* Badges */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 99px;
      font-size: 11px; font-weight: 600;
    }
    .badge-blue   { background: rgba(59,130,246,0.15); color: #93c5fd; }
    .badge-green  { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .badge-amber  { background: rgba(245,158,11,0.15); color: #fcd34d; }
    .badge-gray   { background: rgba(255,255,255,0.06); color: var(--text3); }
    .badge-red    { background: rgba(239,68,68,0.12); color: #fca5a5; }

    .worker-name { font-weight: 700; }
    .worker-rut  { font-size: 11px; color: var(--text3); margin-top: 1px; }

    /* Botón X rojo para desactivar */
    .btn-x {
      width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(239,68,68,0.35);
      background: rgba(239,68,68,0.1); color: #fca5a5;
      font-size: 13px; font-weight: 700; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 0.12s; flex-shrink: 0;
    }
    .btn-x:hover { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.6); }
    /* Botón check verde para reactivar */
    .btn-check {
      width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(16,185,129,0.35);
      background: rgba(16,185,129,0.1); color: #6ee7b7;
      font-size: 13px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 0.12s; flex-shrink: 0;
    }
    .btn-check:hover { background: rgba(16,185,129,0.25); }
    .btn-qr {
      padding: 4px 9px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg3);
      color: var(--text2); font-size: 11px; font-weight: 700;
      cursor: pointer; transition: all 0.12s; white-space: nowrap;
    }
    .btn-qr:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    .actions { display: flex; gap: 5px; align-items: center; }

    /* Modal */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 1rem;
    }
    .overlay.visible { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
      width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 1.2rem; }
    .field { margin-bottom: 12px; }
    .field label {
      display: block; font-size: 11px; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px;
    }
    .field input, .field select {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      padding: 10px 12px; font-family: inherit;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
    .frow { display: flex; gap: 8px; }
    .frow > * { flex: 1; }
    .modal-actions { display: flex; gap: 8px; margin-top: 1.2rem; }
    .modal-actions .btn { flex: 1; justify-content: center; padding: 11px; }

    /* QR modal */
    .qr-modal { text-align: center; }
    .qr-name  { font-size: 18px; font-weight: 700; margin: 8px 0 4px; }
    .qr-meta  { font-size: 12px; color: var(--text3); margin-bottom: 16px; }
    .qr-img   { display: block; margin: 0 auto 16px;
                background: #fff; padding: 12px; border-radius: 8px; }
    .qr-url   {
      font-size: 11px; color: var(--text3); word-break: break-all;
      background: var(--bg3); padding: 8px 12px; border-radius: 6px;
      border: 1px solid var(--border); margin-bottom: 14px;
    }

    /* Print */
    @media print {
      body { background: #fff; color: #000; }
      header, .toolbar, .wt-wrap, .overlay:not(.printing) { display: none !important; }
      .print-cards { display: flex !important; flex-wrap: wrap; gap: 16px; padding: 16px; }
      .print-card {
        border: 2px solid #000; border-radius: 8px; padding: 16px;
        text-align: center; width: 200px;
      }
      .print-card-name { font-size: 14px; font-weight: 700; margin-top: 8px; }
      .print-card-meta { font-size: 11px; color: #555; margin-top: 4px; }
    }
    .print-cards { display: none; }

    .empty-state {
      text-align: center; padding: 3rem 1rem;
      color: var(--text3); font-size: 14px;
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      padding: 10px 18px; border-radius: 99px; font-size: 13px;
      z-index: 300; opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .toast.visible { opacity: 1; }
    .toast.ok    { border-color: var(--green); color: #6ee7b7; }
    .toast.error { border-color: var(--red);   color: #fca5a5; }

    .hint { font-size: 11px; color: var(--text3); margin-top: 8px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="btn-back" href="index.html">←</a>
    <div>
      <div class="header-title">Trabajadores</div>
      <div class="header-sub">Base de datos del campo · Doble clic en celda para editar</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost btn-sm" onclick="imprimirQRs()" title="Imprimir fichas QR">🖨 QRs</button>
    <button class="btn btn-primary" onclick="abrirModalNuevo()">+ Nuevo</button>
  </div>
</header>

<div class="main">

  <div class="toolbar">
    <div class="toolbar-left">
      <div class="filter-tabs">
        <div class="ftab active" id="ftab-activos"   onclick="setFiltro('activos')">Activos</div>
        <div class="ftab"        id="ftab-todos"     onclick="setFiltro('todos')">Todos</div>
        <div class="ftab"        id="ftab-inactivos" onclick="setFiltro('inactivos')">Inactivos</div>
      </div>
    </div>
    <div class="info-text" id="info-count">— cargando —</div>
  </div>

  <div id="tabla-container">
    <div class="empty-state">Cargando trabajadores…</div>
  </div>

</div>

<div class="print-cards" id="printCards"></div>

<!-- Modal nuevo trabajador -->
<div class="overlay" id="overlayNuevo" onclick="cerrarModalNuevo(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Nuevo trabajador</div>

    <div class="frow">
      <div class="field">
        <label>Nombre completo *</label>
        <input type="text" id="nNombre" placeholder="Juan Pérez" autocapitalize="words">
      </div>
      <div class="field">
        <label>RUT</label>
        <input type="text" id="nRut" placeholder="12.345.678-9">
      </div>
    </div>
    <div class="frow">
      <div class="field">
        <label>Tipo de contrato *</label>
        <select id="nTipoContrato">
          <option value="N2">N2</option>
          <option value="N1">N1</option>
          <option value="Pp">Pp (Personal propio)</option>
        </select>
      </div>
      <div class="field">
        <label>Formato de pago *</label>
        <select id="nFormato">
          <option value="Día">Día</option>
          <option value="Trato">Trato</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="field">
        <label>Unidad de control</label>
        <select id="nUnidad">
          <option value="Día">Día</option>
          <option value="Kg">Kg</option>
          <option value="ha">ha</option>
          <option value="Hilera">Hilera</option>
          <option value="Planta">Planta</option>
        </select>
      </div>
      <div class="field">
        <label>Valor unitario ($)</label>
        <input type="number" id="nValor" placeholder="25000" step="100" min="0" inputmode="numeric">
      </div>
    </div>
    <div class="field">
      <label>Proveedor (si aplica)</label>
      <input type="text" id="nProveedor" placeholder="Empresa o persona que lo envía">
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="cerrarModalNuevo()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarNuevo()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal QR -->
<div class="overlay" id="overlayQR" onclick="cerrarModalQR(event)">
  <div class="modal qr-modal" onclick="event.stopPropagation()" style="max-width:340px">
    <div class="modal-title" style="text-align:center">Código QR</div>
    <div class="qr-name" id="qrNombre"></div>
    <div class="qr-meta" id="qrMeta"></div>
    <img class="qr-img" id="qrImg" width="200" height="200" alt="QR">
    <div class="qr-url" id="qrUrl"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="cerrarModalQR()">Cerrar</button>
      <a class="btn btn-primary" id="qrDescarga" download style="flex:1;justify-content:center;text-decoration:none">⬇ Descargar</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────
const SUPA_URL   = 'https://eunuqwzrbqqpykyywjbu.supabase.co';
const SUPA_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1bnVxd3pyYnFxcHlreXl3amJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzYyOTMsImV4cCI6MjA5MTM1MjI5M30.iiCd-6pa8mQgXR6DzMtZjGsJnn-8OD_-ayrRtXj-YkM';
const EMPRESA_ID = 1;
const CAMPO_ID   = 1;
const PWA_BASE   = 'https://jpdelped-adp.github.io/fenologia-laquinta/labores_agricolas.html';

// ── Estado ────────────────────────────────────────────────────────
let _workers   = [];
let _filtro    = 'activos';
let _sortCol   = 'nombre';
let _sortDir   = 'asc';
let _fltNombre = '';
let _fltContrato = '';
let _fltFormato  = '';

// ── Supabase helpers ──────────────────────────────────────────────
async function _supaGet(path) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`,
               'Content-Type': 'application/json', Accept: 'application/json' }
  });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}
async function _supaPost(tabla, data) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${tabla}`, {
    method: 'POST',
    headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`,
               'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}
async function _supaPatch(tabla, id, data) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${tabla}?id=eq.${id}`, {
    method: 'PATCH',
    headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`,
               'Content-Type': 'application/json', Prefer: 'return=minimal' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
}

// ── Carga ─────────────────────────────────────────────────────────
async function cargarTrabajadores() {
  try {
    _workers = await _supaGet(
      `trabajadores?empresa_id=eq.${EMPRESA_ID}&campo_id=eq.${CAMPO_ID}&order=nombre.asc&select=*`
    );
    renderTabla();
  } catch(e) {
    document.getElementById('tabla-container').innerHTML =
      `<div class="empty-state" style="color:var(--red)">Error al cargar: ${e.message}</div>`;
  }
}

function setFiltro(f) {
  _filtro = f;
  ['activos','todos','inactivos'].forEach(k =>
    document.getElementById(`ftab-${k}`).classList.toggle('active', k === f)
  );
  renderTabla();
}

// ── Utilidades ────────────────────────────────────────────────────
function _toTitleCase(s) {
  if (!s) return '';
  const min = new Set(['de','del','la','las','los','el','y','e','o']);
  return String(s).toLowerCase().replace(/\S+/g, (w, i) =>
    (i === 0 || !min.has(w)) ? w.charAt(0).toUpperCase() + w.slice(1) : w
  );
}

function _contratoBadge(tc) {
  if (!tc) return '<span style="color:var(--text3)">—</span>';
  const map = { N2:'badge-blue', N1:'badge-amber', Pp:'badge-green' };
  return `<span class="badge ${map[tc]||'badge-gray'}">${tc}</span>`;
}

function _sortIcon(col) {
  if (_sortCol !== col) return '<span class="sort-arrow">↕</span>';
  return _sortDir === 'asc'
    ? '<span class="sort-arrow asc">↑</span>'
    : '<span class="sort-arrow desc">↓</span>';
}

function sortBy(col) {
  if (_sortCol === col) _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
  else { _sortCol = col; _sortDir = 'asc'; }
  renderTabla();
}

// ── Render tabla ──────────────────────────────────────────────────
function renderTabla() {
  let filas = [..._workers];

  // Filtro activo/inactivo
  if (_filtro === 'activos')   filas = filas.filter(w => w.activo !== false);
  if (_filtro === 'inactivos') filas = filas.filter(w => w.activo === false);

  // Filtros de columna
  if (_fltNombre)   filas = filas.filter(w => w.nombre && w.nombre.toLowerCase().includes(_fltNombre.toLowerCase()));
  if (_fltContrato) filas = filas.filter(w => (w.tipo_contrato || '') === _fltContrato);
  if (_fltFormato)  filas = filas.filter(w => (w.formato_labor || '') === _fltFormato);

  // Ordenar
  filas.sort((a, b) => {
    let va = a[_sortCol] ?? '';
    let vb = b[_sortCol] ?? '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return _sortDir === 'asc' ? -1 : 1;
    if (va > vb) return _sortDir === 'asc' ?  1 : -1;
    return 0;
  });

  document.getElementById('info-count').textContent =
    `${filas.length} trabajador${filas.length !== 1 ? 'es' : ''}`;

  const cont = document.getElementById('tabla-container');
  if (!filas.length) {
    cont.innerHTML = `<div class="wt-wrap"><div class="empty-state">
      Sin resultados${_filtro !== 'todos' ? ` (${_filtro})` : ''}.
    </div></div>`;
    return;
  }

  cont.innerHTML = `
  <div class="wt-wrap">
  <table class="workers-table">
    <thead>
      <tr class="th-names">
        <th class="sortable" onclick="sortBy('nombre')">NOMBRE ${_sortIcon('nombre')}</th>
        <th>RUT</th>
        <th class="sortable" onclick="sortBy('tipo_contrato')">CONTRATO ${_sortIcon('tipo_contrato')}</th>
        <th class="sortable" onclick="sortBy('formato_labor')">FORMATO ${_sortIcon('formato_labor')}</th>
        <th class="sortable" onclick="sortBy('valor_unitario')">VALOR ${_sortIcon('valor_unitario')}</th>
        <th>ESTADO</th>
        <th style="width:80px"></th>
      </tr>
      <tr class="th-filters">
        <th><input class="th-filter-input" placeholder="Buscar nombre…"
          value="${_fltNombre.replace(/"/g,'&quot;')}"
          oninput="_fltNombre=this.value;renderTabla()"></th>
        <th></th>
        <th>
          <select class="th-filter-select" onchange="_fltContrato=this.value;renderTabla()">
            <option value="" ${!_fltContrato?'selected':''}>Todos</option>
            <option value="N2" ${_fltContrato==='N2'?'selected':''}>N2</option>
            <option value="N1" ${_fltContrato==='N1'?'selected':''}>N1</option>
            <option value="Pp"  ${_fltContrato==='Pp'?'selected':''}>Pp</option>
          </select>
        </th>
        <th>
          <select class="th-filter-select" onchange="_fltFormato=this.value;renderTabla()">
            <option value="" ${!_fltFormato?'selected':''}>Todos</option>
            <option value="Día"   ${_fltFormato==='Día'?'selected':''}>Día</option>
            <option value="Trato" ${_fltFormato==='Trato'?'selected':''}>Trato</option>
          </select>
        </th>
        <th></th><th></th><th></th>
      </tr>
    </thead>
    <tbody>
      ${filas.map(w => `
      <tr>
        <td data-editable data-id="${w.id}" data-field="nombre" data-type="text"
            ondblclick="_startEdit(this, ${w.id}, 'nombre', ${JSON.stringify(w.nombre||'')}, 'text')">
          <div class="worker-name">${_toTitleCase(w.nombre)}</div>
        </td>
        <td data-editable data-id="${w.id}" data-field="rut"
            ondblclick="_startEdit(this, ${w.id}, 'rut', ${JSON.stringify(w.rut||'')}, 'text')">
          ${w.rut ? `<span style="font-size:12px;color:var(--text2)">${w.rut}</span>` : '<span style="color:var(--text3)">—</span>'}
        </td>
        <td data-editable
            ondblclick="_startEdit(this, ${w.id}, 'tipo_contrato', ${JSON.stringify(w.tipo_contrato||'N2')}, 'select-contrato')">
          ${_contratoBadge(w.tipo_contrato)}
          ${w.proveedor ? `<div style="font-size:10px;color:var(--text3);margin-top:2px">${w.proveedor}</div>` : ''}
        </td>
        <td data-editable
            ondblclick="_startEdit(this, ${w.id}, 'formato_labor', ${JSON.stringify(w.formato_labor||'Día')}, 'select-formato')">
          <span style="font-size:12px">${w.formato_labor || '—'}</span>
          ${w.unidad_control ? `<span style="font-size:11px;color:var(--text3)"> · ${w.unidad_control}</span>` : ''}
        </td>
        <td data-editable
            ondblclick="_startEdit(this, ${w.id}, 'valor_unitario', ${w.valor_unitario||0}, 'number')">
          ${w.valor_unitario ? `<span style="font-size:12px">$ ${Number(w.valor_unitario).toLocaleString('es-CL')}</span>` : '<span style="color:var(--text3)">—</span>'}
        </td>
        <td>
          <span class="badge ${w.activo !== false ? 'badge-green' : 'badge-red'}">
            ${w.activo !== false ? 'Activo' : 'Inactivo'}
          </span>
        </td>
        <td>
          <div class="actions">
            <button class="btn-qr" onclick="mostrarQR(${w.id})" title="Ver QR">QR</button>
            ${w.activo !== false
              ? `<button class="btn-x" onclick="toggleActivo(${w.id},true)" title="Desactivar">✕</button>`
              : `<button class="btn-check" onclick="toggleActivo(${w.id},false)" title="Reactivar">✓</button>`
            }
          </div>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>
  </div>
  <p class="hint" style="margin-top:8px">💡 Doble clic en cualquier celda para editar directamente</p>`;
}

// ── Inline edit ───────────────────────────────────────────────────
function _startEdit(td, workerId, field, value, type) {
  if (td.dataset.editing) return;
  td.dataset.editing = '1';
  const origHTML = td.innerHTML;

  let el;
  if (type === 'select-contrato') {
    el = document.createElement('select');
    el.className = 'inline-select';
    ['N2','N1','Pp'].forEach(v => {
      const o = new Option(v, v); if (v === value) o.selected = true; el.add(o);
    });
  } else if (type === 'select-formato') {
    el = document.createElement('select');
    el.className = 'inline-select';
    ['Día','Trato'].forEach(v => {
      const o = new Option(v, v); if (v === value) o.selected = true; el.add(o);
    });
  } else {
    el = document.createElement('input');
    el.className = 'inline-input';
    el.type = type === 'number' ? 'number' : 'text';
    el.value = value || '';
    if (type === 'number') { el.step = '100'; el.min = '0'; }
    if (field === 'nombre') el.setAttribute('autocapitalize', 'words');
  }

  td.innerHTML = '';
  td.appendChild(el);
  el.focus();
  if (el.select && type !== 'number') el.select();

  let saved = false;
  const save = async () => {
    if (saved) return; saved = true;
    delete td.dataset.editing;
    const raw = el.value;
    let patch = {};
    if (field === 'nombre')         patch.nombre = raw.trim().toUpperCase();
    else if (field === 'valor_unitario') patch.valor_unitario = parseFloat(raw) || 0;
    else patch[field] = raw.trim() || null;

    try {
      await _supaPatch('trabajadores', workerId, patch);
      const w = _workers.find(x => x.id === workerId);
      if (w) Object.assign(w, patch);
      renderTabla();
      toast('✓ Guardado', 'ok');
    } catch(e) {
      td.innerHTML = origHTML;
      delete td.dataset.editing;
      toast('Error: ' + e.message, 'error');
    }
  };
  const cancel = () => {
    if (saved) return;
    delete td.dataset.editing;
    td.innerHTML = origHTML;
  };

  el.addEventListener('blur', save);
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); el.blur(); }
    if (e.key === 'Escape') { saved = true; el.removeEventListener('blur', save); cancel(); }
  });
  if (el.tagName === 'SELECT') el.addEventListener('change', () => el.blur());
}

// ── Modal nuevo ───────────────────────────────────────────────────
function abrirModalNuevo() {
  document.getElementById('nNombre').value = '';
  document.getElementById('nRut').value    = '';
  document.getElementById('nTipoContrato').value = 'N2';
  document.getElementById('nFormato').value      = 'Día';
  document.getElementById('nUnidad').value       = 'Día';
  document.getElementById('nValor').value        = '25000';
  document.getElementById('nProveedor').value    = '';
  document.getElementById('overlayNuevo').classList.add('visible');
  setTimeout(() => document.getElementById('nNombre').focus(), 100);
}
function cerrarModalNuevo(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('overlayNuevo').classList.remove('visible');
}
async function guardarNuevo() {
  const nombre = document.getElementById('nNombre').value.trim();
  if (!nombre) { toast('Ingresa el nombre', 'error'); return; }
  const payload = {
    empresa_id:     EMPRESA_ID,
    campo_id:       CAMPO_ID,
    nombre:         nombre.toUpperCase(),
    rut:            document.getElementById('nRut').value.trim() || null,
    labor_habitual: null,
    sublabor:       null,
    tipo_contrato:  document.getElementById('nTipoContrato').value,
    formato_labor:  document.getElementById('nFormato').value,
    unidad_control: document.getElementById('nUnidad').value,
    valor_unitario: parseFloat(document.getElementById('nValor').value) || 0,
    proveedor:      document.getElementById('nProveedor').value.trim() || null,
    activo:         true,
  };
  try {
    await _supaPost('trabajadores', payload);
    toast('✅ Trabajador agregado', 'ok');
    cerrarModalNuevo();
    await cargarTrabajadores();
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
}

// ── Toggle activo ─────────────────────────────────────────────────
async function toggleActivo(id, estadoActual) {
  try {
    await _supaPatch('trabajadores', id, { activo: !estadoActual });
    toast(estadoActual ? 'Desactivado' : 'Activado', 'ok');
    await cargarTrabajadores();
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
}

// ── QR ────────────────────────────────────────────────────────────
function qrUrl(id) { return `${PWA_BASE}?t=${id}`; }

function mostrarQR(id) {
  const w = _workers.find(x => x.id === id);
  if (!w) return;
  const url    = qrUrl(id);
  const qrSrc  = `https://chart.googleapis.com/chart?cht=qr&chs=220x220&chl=${encodeURIComponent(url)}&choe=UTF-8`;
  document.getElementById('qrNombre').textContent   = _toTitleCase(w.nombre);
  document.getElementById('qrMeta').textContent     = [w.tipo_contrato, w.formato_labor].filter(Boolean).join(' · ');
  document.getElementById('qrImg').src              = qrSrc;
  document.getElementById('qrUrl').textContent      = url;
  document.getElementById('qrDescarga').href        = qrSrc;
  document.getElementById('qrDescarga').download    = `QR_${w.nombre.replace(/\s+/g,'_')}.png`;
  document.getElementById('overlayQR').classList.add('visible');
}
function cerrarModalQR(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('overlayQR').classList.remove('visible');
}

// ── Imprimir QRs ──────────────────────────────────────────────────
function imprimirQRs() {
  const activos = _workers.filter(w => w.activo !== false);
  if (!activos.length) { toast('No hay trabajadores activos', 'error'); return; }
  const cards = document.getElementById('printCards');
  cards.innerHTML = activos.map(w => {
    const url   = qrUrl(w.id);
    const qrSrc = `https://chart.googleapis.com/chart?cht=qr&chs=180x180&chl=${encodeURIComponent(url)}&choe=UTF-8`;
    return `<div class="print-card">
      <img src="${qrSrc}" width="180" height="180" alt="QR ${w.nombre}">
      <div class="print-card-name">${_toTitleCase(w.nombre)}</div>
      <div class="print-card-meta">${[w.tipo_contrato, w.formato_labor].filter(Boolean).join(' · ') || 'Trabajador'}</div>
    </div>`;
  }).join('');
  toast('Abriendo impresión…', '');
  setTimeout(() => window.print(), 400);
}

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast visible ' + (tipo||'');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('visible'), 2500);
}

// ── Init ──────────────────────────────────────────────────────────
cargarTrabajadores();
</script>
